function logMealQuick(meal){
  const mealSel=settings.mealTypes.map(m=>`<option value="${esc(m.id)}">${esc(m.name)}</option>`).join('');
  const ov=openModal(`
    <div class="modal-head"><h3>Log "${esc(meal.name)}"</h3><button class="icon-btn" data-close aria-label="Close"><i data-lucide="x"></i></button></div>
    <div class="modal-body">
      <div class="frow"><div class="fcol" style="max-width:140px"><label>Servings</label><input type="number" id="lmQty" value="1" min="0.25" step="0.25"></div>
      <div class="fcol"><label>Meal</label><select id="lmMeal">${mealSel}</select></div></div>
      <div class="card" style="padding:12px" id="lmPrev"></div></div>
    <div class="modal-foot"><button class="btn primary full" id="lmGo">Add to Log</button></div>`);
  const upd=()=>{
    const q=Math.max(0.25,+ov.querySelector('#lmQty').value||1);
    const n=scaleN(meal.perServingNutrients||emptyN(),q);
    ov.querySelector('#lmPrev').innerHTML=`<b style="color:var(--cal)">${fmtN(n.calories)}</b> kcal · <b style="color:var(--protein)">${fmtAmt(n.protein)}g</b> P · <b style="color:var(--carbs)">${fmtAmt(n.carbohydrates)}g</b> C · <b style="color:var(--fat)">${fmtAmt(n.fat)}g</b> F`;
  };
  upd();
  ov.querySelector('#lmQty').addEventListener('input',upd);
  ov.querySelector('#lmGo').addEventListener('click',async()=>{
    const q=Math.max(0.25,+ov.querySelector('#lmQty').value||1);
    const per=meal.perServingNutrients||emptyN();
    const entry={
      id:uid(),date:S.date,mealType:ov.querySelector('#lmMeal').value,
      foodId:meal.id,foodName:meal.name,
      servingAmount:q,servingUnit:'serving',servingLabel:fmtAmt(q)+' serving'+(q===1?'':'s'),
      nutrients:scaleN(per,q),per100g:null,gramsTotal:null,timestamp:Date.now()
    };
    try{await dbPut('foodLog',entry);toast('Logged '+meal.name,'success');closeModal();if(S.view==='today')renderToday()}
    catch(e){toast('Could not log meal','error')}
  });
}
function mealBuilder(meal){
  const isEdit=!!meal;
  const m=meal?JSON.parse(JSON.stringify(meal)):{id:uid(),name:'',servings:1,ingredients:[],totalNutrients:emptyN(),perServingNutrients:emptyN(),createdAt:Date.now()};
  const ov=openModal(`
    <div class="modal-head"><h3>${isEdit?'Edit':'Create'} Meal</h3><button class="icon-btn" data-close aria-label="Close"><i data-lucide="x"></i></button></div>
    <div class="modal-body">
      <div class="frow">
        <div class="fcol"><label>Meal name *</label><input id="mbName" value="${esc(m.name)}" placeholder="e.g. Post-workout bowl"></div>
        <div class="fcol" style="max-width:130px"><label>Recipe servings</label><input type="number" id="mbServ" value="${m.servings}" min="1" step="1"></div>
      </div>
      <div class="rg-title">Ingredients</div>
      <div id="mbIngs"></div>
      <div class="search-wrap" style="margin-top:8px"><i data-lucide="search"></i><input id="mbSearch" placeholder="Search to add ingredient…" aria-label="Search ingredient"></div>
      <div id="mbResults"></div>
      <div class="card" style="padding:12px;margin-top:10px"><div class="rg-title" style="padding-top:0">Totals</div><div id="mbTotals"></div></div>
    </div>
    <div class="modal-foot"><button class="btn" data-close style="flex:1">Cancel</button><button class="btn primary" id="mbSave" style="flex:2">Save Meal</button></div>`,{wide:true});
  function recompute(){
    let tot=emptyN();
    m.ingredients.forEach(ing=>{tot=addN(tot,ing.nutrients)});
    m.totalNutrients=tot;
    const sv=Math.max(1,+ov.querySelector('#mbServ').value||1);
    m.servings=sv;
    m.perServingNutrients=scaleN(tot,1/sv);
    const ps=m.perServingNutrients;
    ov.querySelector('#mbTotals').innerHTML=`
      <div class="kv"><span>Total recipe</span><b>${fmtN(tot.calories)} kcal · P ${fmtAmt(tot.protein)}g · C ${fmtAmt(tot.carbohydrates)}g · F ${fmtAmt(tot.fat)}g · Fiber ${fmtAmt(tot.fiber)}g</b></div>
      <div class="kv"><span>Per serving (÷${sv})</span><b>${fmtN(ps.calories)} kcal · P ${fmtAmt(ps.protein)}g · C ${fmtAmt(ps.carbohydrates)}g · F ${fmtAmt(ps.fat)}g</b></div>`;
  }
  function renderIngs(){
    const wrap=ov.querySelector('#mbIngs');
    wrap.innerHTML=m.ingredients.length?m.ingredients.map((ing,i)=>`
      <div class="ing-row"><span style="flex:1">${esc(ing.foodName)}</span>
        <input type="number" value="${ing.amount}" min="1" data-ig="${i}" aria-label="Grams of ${esc(ing.foodName)}"> <span class="tiny">g</span>
        <span class="tiny" style="width:70px;text-align:right">${fmtN(ing.nutrients.calories)} cal</span>
        <button class="icon-btn" data-irm="${i}" aria-label="Remove"><i data-lucide="x"></i></button></div>`).join('')
      :'<p class="muted" style="padding:4px 0">No ingredients yet — search below.</p>';
    icons();
    wrap.querySelectorAll('[data-ig]').forEach(inp=>inp.addEventListener('input',()=>{
      const i=+inp.dataset.ig;const g=Math.max(1,+inp.value||1);
      const ing=m.ingredients[i];
      ing.nutrients=scaleN(ing.per100g,g/100);ing.amount=g;
      recompute();
    }));
    wrap.querySelectorAll('[data-irm]').forEach(b=>b.addEventListener('click',()=>{
      m.ingredients.splice(+b.dataset.irm,1);renderIngs();recompute();
    }));
    recompute();
  }
  renderIngs();
  ov.querySelector('#mbServ').addEventListener('input',recompute);
  const sInput=ov.querySelector('#mbSearch');
  const doSearch=debounce(async()=>{
    const q=sInput.value.trim();if(q.length<2)return;
    const out=ov.querySelector('#mbResults');
    out.innerHTML='<div class="skel"></div><div class="skel"></div>';
    const {customs}=await localMatches(q);
    let html=customs.map((c,i)=>`<div data-lc="${i}">${resRow(c.name,'Your food · per 100g',c.nutrientsPer100g?.calories||0,'Custom','custom')}</div>`).join('');
    let usdaResults=[];
    try{usdaResults=await usdaSearch(q)}catch(e){}
    html+=usdaResults.map((r,i)=>`<div data-lu="${i}">${resRow(r.name,(r.brand?r.brand+' · ':'')+'per 100g',r.nutrientsPer100g.calories,'USDA','usda')}</div>`).join('');
    out.innerHTML=html||'<div class="muted">No results.</div>';
    const addIng=(name,foodId,per100)=>{
      m.ingredients.push({foodId:foodId||uid(),foodName:name,amount:100,unit:'g',per100g:per100,nutrients:scaleN(per100,1)});
      out.innerHTML='';sInput.value='';renderIngs();
    };
    out.querySelectorAll('[data-lc]').forEach(el=>el.addEventListener('click',()=>{
      const c=customs[+el.dataset.lc];addIng(c.name,c.id,Object.assign(emptyN(),c.nutrientsPer100g));
    }));
    out.querySelectorAll('[data-lu]').forEach(el=>el.addEventListener('click',async()=>{
      el.innerHTML='<div class="skel" style="margin:0"></div>';
      const pf=await pendingFromUsda(usdaResults[+el.dataset.lu]);
      addIng(pf.name,pf.fdcId,pf.nutrientsPer100g);
    }));
  },400);
  sInput.addEventListener('input',doSearch);
  ov.querySelector('#mbSave').addEventListener('click',async()=>{
    m.name=ov.querySelector('#mbName').value.trim();
    if(!m.name){toast('Meal name required','error');return}
    if(!m.ingredients.length){toast('Add at least one ingredient','error');return}
    recompute();
    await dbPut('meals',m);
    closeModal();toast('Saved '+m.name,'success');
    if(S.view==='library')renderLibrary();
  });
}

const MEASURE_FIELDS=[

async function renderProgress(){
  chartDefaults();
  const weights=(await dbAll('weightLog')).sort((a,b)=>a.date<b.date?-1:1);
  const workouts=(await dbAll('workoutLog')).sort((a,b)=>b.date<a.date?-1:1).slice(0,20);

  const wRows=weights.slice(-30).reverse().map((w,i,arr)=>{
    const prev=weights[weights.indexOf(w)-1];
    const dPrev=prev?w.kg-prev.kg:null;
    const dStart=weights.length?w.kg-weights[0].kg:0;
    const cls=v=>v==null?'':v<0?'pos':v>0?'neg':'';
    return `<tr><td>${w.date}</td><td><b>${fmtAmt(w.kg)} kg</b></td>
      <td class="${cls(dPrev)}">${dPrev==null?'—':(dPrev>0?'+':'')+fmtAmt(dPrev)}</td>
      <td class="${cls(dStart)}">${(dStart>0?'+':'')+fmtAmt(dStart)}</td>
      <td>${esc(w.note||'')}</td>
      <td><button class="icon-btn" data-wdel="${w.date}" aria-label="Delete weight entry"><i data-lucide="x" style="width:14px;height:14px"></i></button></td></tr>`;
  }).join('');

  const typeIcons={strength:'dumbbell',hiit:'zap',cardio:'heart-pulse',sport:'volleyball',other:'activity'};
  $('#content').innerHTML=`
  ${pageHead('Progress',new Date().toLocaleDateString('en-US',{month:'long',year:'numeric'}))}
  <div class="card">
    <div class="sec-title"><i data-lucide="scale"></i> Body Weight <button class="btn sm primary" id="logWeight" style="margin-left:auto"><i data-lucide="plus"></i> Log Weight</button></div>
    ${weights.length?`<div class="chart-box"><canvas id="weightChart" role="img" aria-label="Weight trend"></canvas></div>
      <div style="overflow-x:auto;margin-top:14px"><table class="dt"><thead><tr><th>Date</th><th>Weight</th><th>Δ prev</th><th>Δ start</th><th>Note</th><th></th></tr></thead><tbody>${wRows}</tbody></table></div>`
    :'<p class="muted">No weight entries yet. Log your first weigh-in.</p>'}
  </div>
  <div class="card">
    <div class="sec-title"><i data-lucide="dumbbell"></i> Workouts <button class="btn sm primary" id="logWorkout" style="margin-left:auto"><i data-lucide="plus"></i> Log Workout</button></div>
    ${workouts.length?workouts.map(w=>`
      <div class="lib-row"><i data-lucide="${typeIcons[w.type]||'activity'}" style="width:18px;height:18px;color:var(--accent)"></i>
        <div class="linfo"><div class="lname">${w.type[0].toUpperCase()+w.type.slice(1)} · ${w.durationMin} min</div>
        <div class="lsub">${w.date} · ${fmtN(w.caloriesBurned)} cal burned${w.notes?' · '+esc(w.notes):''}</div></div>
        <button class="icon-btn" data-wkdel="${w.id}" aria-label="Delete workout"><i data-lucide="x" style="width:14px;height:14px"></i></button></div>`).join('')
    :'<p class="muted">No workouts logged. Today’s calorie target rises automatically when you log one.</p>'}
  </div>
  `;
  icons();

  $('#logWeight').addEventListener('click',()=>weightModal());
  $('#logWorkout').addEventListener('click',()=>workoutModal());
  $$('[data-wdel]').forEach(b=>b.addEventListener('click',async()=>{await dbDel('weightLog',b.dataset.wdel);renderProgress()}));
  $$('[data-wkdel]').forEach(b=>b.addEventListener('click',async()=>{await dbDel('workoutLog',b.dataset.wkdel);renderProgress()}));

  if(window.Chart&&weights.length){
    const labels=weights.map(w=>w.date.slice(5));
    const kg=weights.map(w=>w.kg);
    const ma=kg.map((_,i)=>{
      const s=kg.slice(Math.max(0,i-6),i+1);
      return +(s.reduce((a,b)=>a+b,0)/s.length).toFixed(2);
    });
    makeChart('weightChart',{type:'line',
      data:{labels,datasets:[
        {label:'Weight',data:kg,borderColor:'#5BC8FA',backgroundColor:'rgba(91,200,250,0.15)',pointRadius:3,tension:0.2},
        {label:'7-day avg',data:ma,borderColor:'#0DA877',borderDash:[5,4],pointRadius:0,tension:0.3}
      ]},
      options:{responsive:true,maintainAspectRatio:false,scales:{y:{title:{display:true,text:'kg'}},x:{grid:{display:false}}}}});
  }
}
function weightModal(){
  const ov=openModal(`
    <div class="modal-head"><h3>Log Weight</h3><button class="icon-btn" data-close aria-label="Close"><i data-lucide="x"></i></button></div>
    <div class="modal-body">
      <div class="frow">
        <div class="fcol"><label>Weight (kg)</label><input type="number" id="wKg" step="0.1" min="20" max="400" value="${profile?.weightKg||''}" placeholder="kg"></div>
        <div class="fcol"><label>Date</label><input type="date" id="wDate" value="${S.date}"></div>
      </div>
      <div class="fcol"><label>Note (optional)</label><input id="wNote" placeholder="e.g. morning, fasted"></div>
    </div>
    <div class="modal-foot"><button class="btn primary full" id="wSave">Save</button></div>`);
  ov.querySelector('#wSave').addEventListener('click',async()=>{
    const kg=+ov.querySelector('#wKg').value;
    if(!kg||kg<20){toast('Enter a valid weight','error');return}
    const date=ov.querySelector('#wDate').value||todayStr();
    await dbPut('weightLog',{date,kg,note:ov.querySelector('#wNote').value.trim()});
    if(profile){profile.weightKg=kg;saveProfile()}
    closeModal();toast('Weight logged','success');
    if(S.view==='progress')renderProgress();
  });
}
function workoutModal(){
  const ov=openModal(`
    <div class="modal-head"><h3>Log Workout</h3><button class="icon-btn" data-close aria-label="Close"><i data-lucide="x"></i></button></div>
    <div class="modal-body">
      <div class="frow">
        <div class="fcol"><label>Type</label><select id="wkType">
          ${['strength','hiit','cardio','sport','other'].map(t=>`<option value="${t}">${t[0].toUpperCase()+t.slice(1)}</option>`).join('')}</select></div>
        <div class="fcol"><label>Date</label><input type="date" id="wkDate" value="${S.date}"></div>
      </div>
      <div class="frow">
        <div class="fcol"><label>Duration (min)</label><input type="number" id="wkDur" value="60" min="1"></div>
        <div class="fcol"><label>Calories burned</label><input type="number" id="wkCal" min="0" placeholder="auto-estimated"></div>
      </div>
      <div class="fcol"><label>Notes (optional)</label><input id="wkNotes" placeholder="e.g. push day, 5x5"></div>
      <p class="tiny" style="margin-top:10px">Leave calories blank to estimate from type, duration, and your body weight (MET-based). Logging a workout for today raises today’s calorie target.</p>
    </div>
    <div class="modal-foot"><button class="btn primary full" id="wkSave">Save</button></div>`);
  const est=()=>{
    const type=ov.querySelector('#wkType').value;
    const dur=+ov.querySelector('#wkDur').value||0;
    const kg=+profile?.weightKg||75;
    return Math.round((MET[type]||4)*3.5*kg/200*dur);
  };
  const calIn=ov.querySelector('#wkCal');
  calIn.placeholder='≈ '+est()+' (auto)';
  ['#wkType','#wkDur'].forEach(s=>ov.querySelector(s).addEventListener('input',()=>{calIn.placeholder='≈ '+est()+' (auto)'}));
  ov.querySelector('#wkSave').addEventListener('click',async()=>{
    const dur=+ov.querySelector('#wkDur').value||0;
    if(dur<=0){toast('Enter a duration','error');return}
    const cal=+calIn.value||est();
    await dbPut('workoutLog',{
      id:uid(),date:ov.querySelector('#wkDate').value||todayStr(),
      type:ov.querySelector('#wkType').value,durationMin:dur,
      caloriesBurned:cal,notes:ov.querySelector('#wkNotes').value.trim()
    });
    closeModal();toast('Workout logged (+'+fmtN(cal)+' cal target adjustment)','success');
    if(S.view==='progress')renderProgress();
    if(S.view==='today')renderToday();
  });
}
function measureModal(){
  const ov=openModal(`
    <div class="modal-head"><h3>Log Measurements</h3><button class="icon-btn" data-close aria-label="Close"><i data-lucide="x"></i></button></div>
    <div class="modal-body">
      <div class="fcol" style="margin-bottom:12px"><label>Date</label><input type="date" id="mDate" value="${S.date}"></div>
      <div class="frow">${MEASURE_FIELDS.map(([k,l])=>`

      <p class="tiny">Leave fields blank to skip them.</p>
    </div>
    <div class="modal-foot"><button class="btn primary full" id="mSave">Save</button></div>`);
  ov.querySelector('#mSave').addEventListener('click',async()=>{
    const rec={id:uid(),date:ov.querySelector('#mDate').value||todayStr()};
    let any=false;
    MEASURE_FIELDS.forEach(([k])=>{
      const v=parseFloat(ov.querySelector('[data-mf="'+k+'"]').value);

    closeModal();toast('Measurements saved','success');
    if(S.view==='progress')renderProgress();

      const r=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKeys.anthropic,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1,messages:[{role:'user',content:'hi'}]})
      });
      if(r.ok)toast('Anthropic key works','success');
      else{const e=await r.json().catch(()=>({}));toast('Anthropic test failed (HTTP '+r.status+'): '+(e.error?.message||'invalid key'),'error')}
    }catch(e){toast('Anthropic test failed: '+(e.message||e),'error')}
    b.disabled=false;b.textContent='Test Anthropic';
  });

  /* meal types */
  const mtList=$('#mtList');
  let dragEl=null;
  mtList.querySelectorAll('.mt-row').forEach(row=>{
    row.addEventListener('dragstart',()=>{dragEl=row;row.classList.add('dragging')});
    row.addEventListener('dragend',()=>{row.classList.remove('dragging');dragEl=null});
    row.addEventListener('dragover',e=>{
      e.preventDefault();
      if(!dragEl||dragEl===row)return;
      const r=row.getBoundingClientRect();
      const after=e.clientY>r.top+r.height/2;
      row.parentNode.insertBefore(dragEl,after?row.nextSibling:row);
    });
  });
  $('#mtAdd').addEventListener('click',()=>{
    settings.mealTypes.push({id:'meal_'+Date.now(),name:'New Meal',color:'#0DA877',start:'12:00',end:'14:00'});
    saveSettings();renderSettings();
  });
  $$('[data-mtdel]').forEach(b=>b.addEventListener('click',async()=>{
    if(settings.mealTypes.length<=1){toast('Keep at least one meal type','error');return}
    const i=+b.dataset.mtdel;
    if(await confirmDialog('Delete meal type "'+settings.mealTypes[i].name+'"? Existing log entries keep their meal tag.',{danger:true,confirmText:'Delete'})){
      settings.mealTypes.splice(i,1);saveSettings();renderSettings();
    }
  }));
  $('#mtSave').addEventListener('click',()=>{
    const rows=[...mtList.querySelectorAll('.mt-row')];
    const newList=rows.map(r=>{
      const old=settings.mealTypes[+r.dataset.mi];
      return {id:old.id,name:r.querySelector('[data-mtname]').value.trim()||old.name,
        color:r.querySelector('[data-mtcolor]').value,
        start:r.querySelector('[data-mtstart]').value,end:r.querySelector('[data-mtend]').value,
        share:Math.max(0,Math.min(100,+r.querySelector('[data-mtshare]').value||0))};
    });
    const shareSum=newList.reduce((s,m)=>s+m.share,0);
    settings.mealTypes=newList;saveSettings();
    toast('Meal types saved'+(Math.abs(shareSum-100)>2?' — note: calorie shares sum to '+shareSum+'%':''),'success');renderSettings();
  });

  /* data management */
  $('#expCsv').addEventListener('click',exportAllCsv);
  $('#impCsv').addEventListener('click',()=>$('#impCsvFile').click());
  $('#impCsvFile').addEventListener('change',e=>{if(e.target.files[0])importCsv(e.target.files[0])});
  $('#expJson').addEventListener('click',exportJson);
  $('#impJson').addEventListener('click',()=>$('#impJsonFile').click());
  $('#impJsonFile').addEventListener('change',e=>{if(e.target.files[0])restoreJson(e.target.files[0])});
  $('#clearAll').addEventListener('click',clearAllData);
}

/* ---------- DATA MANAGEMENT ---------- */
const STORES=['foodLog','customFoods','meals','weightLog','workoutLog','bodyMeasurements'];
async function exportAllCsv(){
  try{
    const stamp=todayStr();
    for(const store of STORES){
      const rows=await dbAll(store);
      if(!rows.length)continue;
      const flat=rows.map(r=>{
        const o={};
        for(const [k,v] of Object.entries(r)){
          o[k]=(v&&typeof v==='object')?JSON.stringify(v):v;
        }
        return o;
      });
      download('nutricore_'+store+'_'+stamp+'.csv',Papa.unparse(flat),'text/csv');
      await new Promise(r=>setTimeout(r,250));
    }
    toast('CSV export complete (one file per data type)','success');
  }catch(err){toast('Export failed: '+(err.message||err),'error')}
}
function detectStore(headers){
  const h=new Set(headers);
  if(h.has('mealType')&&h.has('nutrients'))return 'foodLog';
  if(h.has('nutrientsPer100g'))return 'customFoods';
  if(h.has('ingredients'))return 'meals';
  if(h.has('kg'))return 'weightLog';
  if(h.has('durationMin'))return 'workoutLog';
  if(h.has('waistCm'))return 'bodyMeasurements';
  return null;
}
function importCsv(file){
  Papa.parse(file,{header:true,skipEmptyLines:true,complete:async res=>{
    try{
      const store=detectStore(res.meta.fields||[]);
      if(!store){toast('Unrecognized CSV format','error');return}
      const existing=new Set((await dbAll(store)).map(r=>r[store==='weightLog'?'date':'id']));
      let added=0;
      for(const row of res.data){
        const obj={};
        for(const [k,v] of Object.entries(row)){
          if(v===''||v==null){obj[k]=v===''?null:v;continue}
          if(typeof v==='string'&&(v.startsWith('{')||v.startsWith('['))){
            try{obj[k]=JSON.parse(v)}catch(e){obj[k]=v}
          }else if(!isNaN(+v)&&v!==''&&!['id','date','foodId','fdcId','mealType','name','brand','note','notes','servingLabel','servingUnit','foodName','type','source'].includes(k)){
            obj[k]=+v;
          }else obj[k]=v;
        }
        const key=obj[store==='weightLog'?'date':'id'];
        if(!key||existing.has(key))continue;
        await dbPut(store,obj);added++;
      }
      toast('Imported '+added+' record'+(added===1?'':'s')+' into '+store,'success');
    }catch(err){toast('Import failed: '+(err.message||err),'error')}
  },error:err=>toast('CSV parse error: '+err.message,'error')});
}
async function exportJson(){
  try{
    const dump={app:'NutriCore',version:1,exportedAt:new Date().toISOString(),stores:{},config:{}};
    for(const s of STORES)dump.stores[s]=await dbAll(s);
    ['nt_profile','nt_targets','nt_nutrient_targets','nt_settings'].forEach(k=>{dump.config[k]=lsGet(k,null)});
    download('nutricore_backup_'+todayStr()+'.json',JSON.stringify(dump,null,2),'application/json');
    toast('Backup downloaded','success');
  }catch(err){toast('Backup failed: '+(err.message||err),'error')}
}
function restoreJson(file){
  const reader=new FileReader();
  reader.onload=async()=>{
    try{
      const dump=JSON.parse(reader.result);
      if(!dump||typeof dump.stores!=='object')throw new Error('Invalid backup file (missing stores)');
      const counts=STORES.map(s=>(dump.stores[s]||[]).length+' '+s).join(', ');
      if(!await confirmDialog('Restore backup? This OVERWRITES current data. Backup contains: '+counts,{danger:true,confirmText:'Overwrite & Restore'}))return;
      for(const s of STORES){
        await dbClear(s);
        const rows=dump.stores[s]||[];
        if(rows.length)await dbBulkPut(s,rows);
      }
      if(dump.config){
        for(const [k,v] of Object.entries(dump.config)){if(v!=null)lsSet(k,v)}
      }
      loadSettings();
      toast('Backup restored','success');
      updateTopbar();setView('today');
    }catch(err){toast('Restore failed: '+(err.message||err),'error')}
  };
  reader.readAsText(file);
}
async function clearAllData(){
  if(!await confirmDialog('This permanently deletes ALL logs, foods, meals, weights, workouts, and measurements.',{danger:true,confirmText:'Continue'}))return;
  if(!await confirmDialog('Final confirmation. This cannot be undone.',{danger:true,confirmText:'Delete Everything',typed:'DELETE'}))return;
  for(const s of STORES)await dbClear(s);
  ['nt_profile','nt_targets','nt_nutrient_targets','nt_settings'].forEach(k=>localStorage.removeItem(k));
  loadSettings();profile=null;targetsByType=null;
  toast('All data cleared','success');
  showOnboarding();
}

/* ============================================================
   ONBOARDING
============================================================ */
function showOnboarding(){
  const ob=$('#onboard');
  ob.hidden=false;
  const state={step:0,name:'',dob:'',sex:'male',heightCm:'',weightKg:'',activity:'moderate',goal:'maintain',weeklyRate:0.5,
    usdaKey:apiKeys.usda||'',anthropicKey:apiKeys.anthropic||'',
    week:{0:'rest',1:'training',2:'training',3:'rest',4:'training',5:'training',6:'cardio'}};
  const dows=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  function render(){
    const dots='<div class="ob-step-dots">'+[0,1,2,3,4].map(i=>'<span class="'+(i===state.step?'on':'')+'"></span>').join('')+'</div>';
    let html='';
    if(state.step===0){
      html=`${dots}
        <div style="text-align:center;margin-bottom:24px"><div class="logo" style="width:64px;height:64px;font-size:30px;margin:0 auto 16px">N</div></div>
        <div class="ob-title">NutriCore</div>
        <div class="ob-sub">Serious nutrition tracking. No ads, no paywalls, no compromises.<br>Let's set up your targets.</div>
        <button class="btn primary full" id="obNext">Get Started</button>`;
    }else if(state.step===1){
      html=`${dots}<div class="ob-title">About You</div><div class="ob-sub">Used for Mifflin-St Jeor BMR and TDEE.</div>
        <div class="frow"><div class="fcol"><label>Name</label><input id="obName" value="${esc(state.name)}"></div>
        <div class="fcol"><label>Date of Birth</label><input type="date" id="obDob" value="${esc(state.dob)}"></div></div>
        <div class="frow"><div class="fcol"><label>Sex</label><select id="obSex"><option value="male" ${state.sex==='male'?'selected':''}>Male</option><option value="female" ${state.sex==='female'?'selected':''}>Female</option></select></div>
        <div class="fcol"><label>Height (cm)</label><input type="number" id="obH" value="${state.heightCm}"></div>
        <div class="fcol"><label>Weight (kg)</label><input type="number" step="0.1" id="obW" value="${state.weightKg}"></div></div>
        <div class="fcol" style="margin-bottom:16px"><label>Activity Level</label><select id="obAct">
          ${Object.entries(ACTIVITY_INFO).map(([k,v])=>`<option value="${k}" ${state.activity===k?'selected':''}>${v}</option>`).join('')}</select></div>
        <div style="display:flex;gap:10px"><button class="btn" id="obBack" style="flex:1">Back</button><button class="btn primary" id="obNext" style="flex:2">Continue</button></div>`;
    }else if(state.step===2){
      const goals=[['cut','Cut','Lose fat while keeping muscle. Calorie deficit.'],['maintain','Maintain','Hold current weight. Eat at TDEE.'],['bulk','Bulk','Build muscle. Controlled calorie surplus.']];
      html=`${dots}<div class="ob-title">Your Goal</div><div class="ob-sub">You can change this anytime in Settings.</div>
        ${goals.map(([k,t,d])=>`<div class="goal-card ${state.goal===k?'sel':''}" data-goal="${k}" role="button" tabindex="0"><div class="gt">${t}</div><div class="gd">${d}</div></div>`).join('')}
        <div id="obRateWrap" ${state.goal==='maintain'?'hidden':''} style="margin:14px 0">
          <label class="tiny" style="font-weight:var(--fw-semibold)">Weekly rate: <span id="obRateVal">${state.weeklyRate}</span> kg/week</label>
          <input type="range" id="obRate" min="0.25" max="1" step="0.25" value="${state.weeklyRate}" style="width:100%;padding:0">
        </div>
        <div style="display:flex;gap:10px;margin-top:10px"><button class="btn" id="obBack" style="flex:1">Back</button><button class="btn primary" id="obNext" style="flex:2">Continue</button></div>`;
    }else if(state.step===3){
      html=`${dots}<div class="ob-title">Connect Data Sources</div><div class="ob-sub">Both keys are stored only in this browser and sent only to their own APIs. You can add or change them later in Settings.</div>
        <div class="fcol" style="margin-bottom:14px"><label>USDA FoodData Central API key — powers food search. <a href="https://fdc.nal.usda.gov/api-key-signup.html" target="_blank" rel="noopener">Get a free key</a></label>
          <input id="obUsda" value="${esc(state.usdaKey)}" placeholder="Paste USDA key (recommended)" autocomplete="off"></div>
        <div class="fcol" style="margin-bottom:6px"><label>Anthropic API key — optional, enables AI photo logging</label>
          <input id="obAnthropic" type="password" value="${esc(state.anthropicKey)}" placeholder="sk-ant-… (optional)" autocomplete="off"></div>
        <p class="tiny" style="margin-bottom:16px">Without a USDA key you can still log custom foods, barcodes, and saved meals.</p>
        <div style="display:flex;gap:10px"><button class="btn" id="obBack" style="flex:1">Back</button><button class="btn primary" id="obNext" style="flex:2">${'Continue'}</button></div>
        <button class="btn full" id="obSkipKeys" style="margin-top:10px;border:none;color:var(--text-muted)">Skip for now</button>`;
    }else{
      html=`${dots}<div class="ob-title">Week Schedule</div><div class="ob-sub">Assign each day a type — macros adjust automatically.</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
          <button class="btn sm" data-preset="5day">5-day lifting split</button>
          <button class="btn sm" data-preset="3day">3-day split</button>
          <button class="btn sm" data-preset="rest">All rest days</button></div>
        ${dows.map((d,i)=>`<div class="sched-row"><span class="dname">${d}</span>
          <select data-obdow="${i}" style="flex:1">${Object.entries(DAY_TYPES).map(([k,v])=>`<option value="${k}" ${state.week[i]===k?'selected':''}>${v.label}</option>`).join('')}</select></div>`).join('')}
        <div style="display:flex;gap:10px;margin-top:18px"><button class="btn" id="obBack" style="flex:1">Back</button><button class="btn primary" id="obNext" style="flex:2">Finish Setup</button></div>`;
    }
    ob.innerHTML='<div class="ob-wrap">'+html+'</div>';
    icons();
    const nx=ob.querySelector('#obNext'),bk=ob.querySelector('#obBack');
    if(bk)bk.addEventListener('click',()=>{capture();state.step--;render()});
    if(nx)nx.addEventListener('click',()=>{
      if(!capture(true))return;
      if(state.step===4){finish();return}
      state.step++;render();
    });
    const skipKeys=ob.querySelector('#obSkipKeys');
    if(skipKeys)skipKeys.addEventListener('click',()=>{state.usdaKey='';state.anthropicKey='';state.step++;render()});
    ob.querySelectorAll('.goal-card').forEach(c=>{
      const pick=()=>{state.goal=c.dataset.goal;render()};
      c.addEventListener('click',pick);
      c.addEventListener('keydown',e=>{if(e.key==='Enter')pick()});
    });
    const rate=ob.querySelector('#obRate');
    if(rate)rate.addEventListener('input',()=>{state.weeklyRate=+rate.value;ob.querySelector('#obRateVal').textContent=rate.value});
    ob.querySelectorAll('[data-preset]').forEach(b=>b.addEventListener('click',()=>{
      const p=b.dataset.preset;
      if(p==='5day')state.week={0:'rest',1:'training',2:'training',3:'training',4:'training',5:'training',6:'cardio'};
      else if(p==='3day')state.week={0:'rest',1:'training',2:'rest',3:'training',4:'rest',5:'training',6:'cardio'};
      else state.week={0:'rest',1:'rest',2:'rest',3:'rest',4:'rest',5:'rest',6:'rest'};
      render();
    }));
  }
  function capture(validate){
    if(state.step===1){
      state.name=ob.querySelector('#obName')?.value.trim()??state.name;
      state.dob=ob.querySelector('#obDob')?.value??state.dob;
      state.sex=ob.querySelector('#obSex')?.value??state.sex;
      state.heightCm=+ob.querySelector('#obH')?.value||state.heightCm;
      state.weightKg=+ob.querySelector('#obW')?.value||state.weightKg;
      state.activity=ob.querySelector('#obAct')?.value??state.activity;
      if(validate&&(!state.heightCm||!state.weightKg)){toast('Height and weight are required','error');return false}
    }
    if(state.step===3){
      state.usdaKey=ob.querySelector('#obUsda')?.value.trim()??state.usdaKey;
      state.anthropicKey=ob.querySelector('#obAnthropic')?.value.trim()??state.anthropicKey;
    }
    if(state.step===4){
      ob.querySelectorAll('[data-obdow]').forEach(s=>{state.week[+s.dataset.obdow]=s.value});
    }
    return true;
  }
  function finish(){
    capture();
    profile={name:state.name,dob:state.dob,sex:state.sex,heightCm:state.heightCm,weightKg:state.weightKg,
      activity:state.activity,goal:state.goal,weeklyRate:state.goal==='maintain'?0:state.weeklyRate};
    saveProfile();
    if(state.usdaKey)apiKeys.usda=state.usdaKey;
    if(state.anthropicKey)apiKeys.anthropic=state.anthropicKey;
    saveKeys();
    targetsByType=defaultDayTargets(profile);saveTargets();
    settings.weekSchedule=state.week;saveSettings();
    ob.hidden=true;
    updateTopbar();setView('today');
    toast('Welcome to NutriCore, '+(profile.name||'athlete')+'!','success');
  }
  render();
}

function registerServiceWorker(){
  /* Optional PWA hook — inline service workers can't be registered from a
     standalone file, so this is a graceful no-op outside http(s) contexts. */
  try{
    if('serviceWorker' in navigator&&location.protocol.startsWith('http')){/* no external sw file by design */}
  }catch(e){}
}
function checkFirstLaunch(){
  if(!profile)showOnboarding();
}
let __initDone=false;
document.addEventListener('DOMContentLoaded',async()=>{
  if(__initDone)return;__initDone=true;
  try{
    await initDB();
  }catch(err){
    document.body.innerHTML='<div style="padding:40px;font-family:Inter,sans-serif;color:#F0F0F8;background:#08080E;min-height:100vh"><h2>NutriCore could not open its database</h2><p style="color:#8888AA;margin-top:10px">'+esc(err?.message||err)+'</p><p style="color:#8888AA">Try a different browser or disable private-browsing restrictions on IndexedDB.</p></div>';
    return;
  }
  loadSettings();
  buildNavs();
  initTopbar();
  updateTopbar();
  S.lastStreak=await streakCalc();
  checkFirstLaunch();
  $('#fab').addEventListener('click',()=>openAddModal());
  await setView('today');
  icons();
  registerServiceWorker();
});
