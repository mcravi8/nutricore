<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>NutriCore</title>
<meta name="theme-color" content="#08080E">
<meta name="background-color" content="#08080E">
<meta name="application-name" content="NutriCore">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@0.383.0/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root{
  --bg-base:#000000; --bg-surface:#1C1C1E; --bg-raised:#2C2C2E; --bg-hover:#3A3A3C;
  --border:#38383A; --border-strong:#48484A;
  --text-primary:#FFFFFF; --text-secondary:#8E8E93; --text-muted:#636366;
  --cal:#FF6B6B; --protein:#5BC8FA; --carbs:#FFD166; --fat:#FF9A56; --fiber:#6BCB77;
  --water:#4ECDC4; --sodium:#DA77F2; --sugar:#FF8FAB;
  --vitamins:#A78BFA; --minerals:#34D399; --electrolytes:#60A5FA; --antioxidants:#F472B6; --omega:#FBBF24;
  --success:#51CF66; --warning:#FCC419; --danger:#FF6B6B;
  --accent:#0DA877; --accent-dim:rgba(13,168,119,0.15); --accent-glow:rgba(13,168,119,0.35);
  --font-xs:11px; --font-sm:13px; --font-base:15px; --font-md:17px; --font-lg:20px; --font-xl:24px; --font-2xl:32px; --font-3xl:42px;
  --fw-light:300; --fw-regular:400; --fw-medium:500; --fw-semibold:600; --fw-bold:700; --fw-black:800;
  --radius-sm:6px; --radius-md:12px; --radius-lg:16px; --radius-xl:24px; --radius-full:9999px;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.4); --shadow-md:0 4px 16px rgba(0,0,0,0.5); --shadow-lg:0 12px 40px rgba(0,0,0,0.7);
  --glow-accent:0 0 24px rgba(13,168,119,0.3);
  --transition:150ms cubic-bezier(0.4,0,0.2,1); --transition-slow:300ms cubic-bezier(0.4,0,0.2,1);
  --topbar-h:56px; --sidenav-w:68px; --bottomnav-h:60px;
}
/* ---------- LIGHT THEME (iOS system-grouped palette) ---------- */
html[data-theme="light"]{
  --bg-base:#F2F2F7; --bg-surface:#FFFFFF; --bg-raised:#FFFFFF; --bg-hover:#F2F2F7;
  --border:#E5E5EA; --border-strong:#D1D1D6;
  --text-primary:#0B0B0F; --text-secondary:#6E6E73; --text-muted:#AEAEB2;
  --accent:#0DA877; --accent-dim:rgba(13,168,119,0.13); --accent-glow:rgba(13,168,119,0.25);
  --shadow-sm:0 1px 2px rgba(16,24,40,0.05); --shadow-md:0 4px 14px rgba(16,24,40,0.08); --shadow-lg:0 16px 44px rgba(16,24,40,0.16);
  --glow-accent:0 2px 10px rgba(13,168,119,0.20);
}
html[data-theme="light"] #topbar{background:rgba(242,242,247,0.82);border-bottom-color:rgba(0,0,0,0.08)}
html[data-theme="light"] #bottomnav{background:rgba(249,249,251,0.85);border-top-color:rgba(0,0,0,0.08)}
html[data-theme="light"] .overlay{background:rgba(30,34,42,0.4)}
html[data-theme="light"] .card,html[data-theme="light"] .meal{border:none;box-shadow:0 1px 2px rgba(16,24,40,0.05),0 4px 14px rgba(16,24,40,0.05)}
html[data-theme="light"] .meal-head{border-left:none;padding-left:14px}
html[data-theme="light"] .seg{background:#E9E9EB;border:none;padding:2px;border-radius:10px}
html[data-theme="light"] .seg button{border-radius:8px;color:#3C3C43}
html[data-theme="light"] .seg button.active{background:#FFFFFF;color:#0B0B0F;box-shadow:0 1px 4px rgba(0,0,0,0.12),0 3px 8px rgba(0,0,0,0.06)}
html[data-theme="light"] input,html[data-theme="light"] select,html[data-theme="light"] textarea{background:#F2F2F7;border-color:transparent}
html[data-theme="light"] input:focus,html[data-theme="light"] select:focus,html[data-theme="light"] textarea:focus{border-color:var(--accent);background:#FFFFFF}
html[data-theme="light"] .btn{background:#FFFFFF;border-color:#E5E5EA}
html[data-theme="light"] .btn:hover{background:#F2F2F7}
html[data-theme="light"] .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
html[data-theme="light"] .bar-track{background:#E5E5EA}
html[data-theme="light"] .qchip,html[data-theme="light"] .subtab{box-shadow:0 1px 2px rgba(16,24,40,0.04);border:none;background:#FFFFFF}
html[data-theme="light"] .subtab.active{background:var(--accent-dim);color:var(--accent)}
html[data-theme="light"] .glass{background:#E5E5EA}
html[data-theme="light"] #ctxMenu,html[data-theme="light"] .cal-pop{border:none;box-shadow:var(--shadow-lg)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{height:100%;background:var(--bg-base);color:var(--text-primary);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Inter',system-ui,sans-serif;font-feature-settings:"cv02","cv03","cv04","cv11";font-size:var(--font-base);overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer;font-size:inherit}
input,select,textarea{font-family:inherit;color:var(--text-primary);background:var(--bg-base);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:var(--font-sm);outline:none;transition:border-color var(--transition)}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input[type=number]{-moz-appearance:textfield}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
[hidden]{display:none !important}
a{color:var(--accent)}
svg.lucide{width:20px;height:20px;stroke-width:2}

/* ---------- TOPBAR ---------- */
#topbar{position:fixed;top:0;left:0;right:0;height:calc(var(--topbar-h) + env(safe-area-inset-top));background:rgba(8,8,14,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:env(safe-area-inset-top) 16px 0;z-index:50}
.brand{display:flex;align-items:center;gap:8px;margin-right:8px}
.logo{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:var(--fw-black);font-size:15px;color:#fff;box-shadow:var(--glow-accent)}
.brand span{font-size:16px;font-weight:var(--fw-semibold)}
.datenav{display:flex;align-items:center;gap:2px;flex:1;justify-content:center}
#dateLabel{font-size:var(--font-base);font-weight:var(--fw-semibold);padding:6px 12px;border-radius:var(--radius-sm)}
#dateLabel:hover{background:var(--bg-hover)}
.icon-btn{width:36px;height:36px;border-radius:var(--radius-sm);display:inline-flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:background var(--transition),color var(--transition)}
.icon-btn:hover{background:var(--bg-hover);color:var(--text-primary)}
.topbar-right{display:flex;align-items:center;gap:8px}
.chip{padding:5px 12px;border-radius:var(--radius-full);font-size:var(--font-xs);font-weight:var(--fw-semibold);border:1px solid var(--border);background:var(--bg-surface);white-space:nowrap;transition:all var(--transition)}
.chip:hover{border-color:var(--border-strong)}
.cal-pop{position:absolute;top:calc(var(--topbar-h) + 6px);left:50%;transform:translateX(-50%);background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);padding:12px;z-index:60;width:300px}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-weight:var(--fw-semibold);font-size:var(--font-sm)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{font-size:10px;color:var(--text-muted);text-align:center;padding:4px 0;font-weight:var(--fw-semibold)}
.cal-day{position:relative;height:34px;border-radius:var(--radius-sm);font-size:var(--font-sm);color:var(--text-secondary)}
.cal-day:hover{background:var(--bg-hover)}
.cal-day.sel{background:var(--accent);color:#fff;font-weight:var(--fw-bold)}
.cal-day.today{border:1px solid var(--accent)}
.cal-day .dot{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--success)}

/* ---------- NAV ---------- */
#sidenav{position:fixed;top:calc(var(--topbar-h) + env(safe-area-inset-top));left:0;bottom:0;width:var(--sidenav-w);background:var(--bg-surface);border-right:1px solid var(--border);display:flex;flex-direction:column;gap:4px;padding:12px 8px;z-index:40;transition:width var(--transition-slow);overflow:hidden}
#sidenav:hover{width:200px}
.nav-item{display:flex;align-items:center;gap:14px;padding:10px 14px;border-radius:var(--radius-md);color:var(--text-secondary);font-size:var(--font-sm);font-weight:var(--fw-medium);white-space:nowrap;transition:all var(--transition)}
.nav-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.nav-item.active{color:var(--accent);background:var(--accent-dim)}
.nav-item svg{flex:0 0 22px;width:22px;height:22px}
#bottomnav{display:none;position:fixed;bottom:0;left:0;right:0;height:calc(var(--bottomnav-h) + env(safe-area-inset-bottom,0px));background:rgba(17,17,24,0.95);backdrop-filter:blur(12px);border-top:1px solid var(--border);z-index:40;padding-bottom:env(safe-area-inset-bottom,0px);align-items:stretch}
#bottomnav .nav-item{flex-direction:column;gap:3px;padding:8px 2px 6px;flex:1;font-size:10px;font-weight:var(--fw-medium);border-radius:0;justify-content:flex-start;align-items:center}
#bottomnav .nav-item svg{flex:0 0 24px;width:24px;height:24px}

/* ---------- MAIN ---------- */
#main{position:fixed;top:calc(var(--topbar-h) + env(safe-area-inset-top));left:var(--sidenav-w);right:0;bottom:0;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth}
.content{max-width:960px;margin:0 auto;padding:20px 24px 120px}
.card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:16px}
.sec-title{font-size:var(--font-md);font-weight:var(--fw-bold);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-title svg{width:18px;height:18px;color:var(--text-secondary)}
.muted{color:var(--text-secondary);font-size:var(--font-sm)}
.tiny{color:var(--text-muted);font-size:var(--font-xs)}

/* ---------- BUTTONS ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:9px 16px;border-radius:var(--radius-md);font-size:var(--font-sm);font-weight:var(--fw-semibold);border:1px solid var(--border);background:var(--bg-raised);transition:all var(--transition)}
.btn:hover{background:var(--bg-hover);border-color:var(--border-strong)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{filter:brightness(1.12);box-shadow:var(--glow-accent)}
.btn.danger{background:transparent;border-color:var(--danger);color:var(--danger)}
.btn.danger:hover{background:rgba(255,107,107,0.1)}
.btn.full{width:100%}
.btn.sm{padding:5px 10px;font-size:var(--font-xs);border-radius:var(--radius-sm)}
.btn svg{width:16px;height:16px}
.btn:disabled{opacity:0.45;cursor:not-allowed}

/* ---------- MACRO SUMMARY BAR ---------- */
#macrobar{position:sticky;top:0;z-index:30;background:var(--bg-surface);border-bottom:1px solid var(--border);margin:-20px -24px 20px;padding:12px 24px;display:flex;align-items:center;gap:24px;min-height:80px}
.calring{position:relative;width:96px;height:96px;flex:0 0 96px}
.calring svg{width:100%;height:100%;transform:rotate(-90deg)}
.calring .track{fill:none;stroke:var(--bg-hover);stroke-width:8}
.calring .prog{fill:none;stroke:var(--cal);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 600ms cubic-bezier(0,0,0.2,1),stroke var(--transition)}
.calring .prog.over{stroke:var(--danger)}
.calring .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.calring .center .big{font-size:19px;font-weight:var(--fw-bold);line-height:1.05;font-variant-numeric:tabular-nums}
.calring .center .big.over{color:var(--danger)}
.calring .center .sub{font-size:9px;color:var(--text-muted);margin-top:1px}
.mbars{flex:1;display:flex;gap:20px;min-width:0;flex-wrap:wrap}
.mbar{flex:1;min-width:130px}
.mbar .row1{display:flex;align-items:center;gap:6px;font-size:var(--font-xs);margin-bottom:5px}
.mbar .dot{width:8px;height:8px;border-radius:50%}
.mbar .lbl{color:var(--text-secondary);font-weight:var(--fw-medium)}
.mbar .val{margin-left:auto;font-weight:var(--fw-semibold);font-variant-numeric:tabular-nums}
.bar-track{height:5px;background:var(--bg-hover);border-radius:var(--radius-full);overflow:hidden}
.bar-fill{height:100%;border-radius:var(--radius-full);transform-origin:left;animation:fillX 400ms cubic-bezier(0,0,0.2,1) backwards}
@keyframes fillX{from{transform:scaleX(0)}}
.wadj{font-size:var(--font-xs);color:var(--success);font-weight:var(--fw-semibold);margin-top:3px;display:flex;align-items:center;gap:4px}
.wadj svg{width:12px;height:12px}

/* ---------- MEALS ---------- */
.meal{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:12px;overflow:hidden}
.meal-head{display:flex;align-items:center;gap:10px;padding:12px 14px;border-left:3px solid var(--accent);cursor:pointer;user-select:none}
.meal-head:hover{background:var(--bg-hover)}
.meal-head .chev{transition:transform var(--transition);color:var(--text-muted);display:flex}
.meal-head .chev.open{transform:rotate(90deg)}
.meal-head .mname{font-weight:var(--fw-semibold);font-size:var(--font-base)}
.meal-head .mcal{margin-left:auto;font-weight:var(--fw-bold);font-variant-numeric:tabular-nums;color:var(--text-secondary);font-size:var(--font-sm)}
.meal-head .addbtn{color:var(--accent);font-weight:var(--fw-semibold);font-size:var(--font-sm);padding:4px 10px;border-radius:var(--radius-sm);display:inline-flex;align-items:center;gap:4px}
.meal-head .addbtn:hover{background:var(--accent-dim)}
.meal-head .addbtn svg{width:14px;height:14px}
.entry{display:flex;align-items:center;gap:12px;padding:11px 16px 11px 17px;border-top:1px solid var(--border);cursor:pointer;animation:slideIn 250ms cubic-bezier(0,0,0.2,1)}
.entry:hover{background:var(--bg-hover)}
.entry.flash{animation:flashIn 800ms}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}}
@keyframes flashIn{0%{background:var(--accent-dim)}100%{background:transparent}}
.entry.removing{animation:slideOut 250ms forwards}
@keyframes slideOut{to{opacity:0;transform:translateX(-30px)}}
.entry .einfo{flex:1;min-width:0}
.entry .ename{font-weight:var(--fw-bold);font-size:var(--font-base);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry .eserv{font-size:var(--font-sm);color:var(--text-secondary);margin-top:1px}
.entry .ecal{font-weight:var(--fw-bold);font-variant-numeric:tabular-nums;text-align:right}
.entry .edots{display:flex;gap:5px;margin-top:4px;justify-content:flex-end}
.entry .edots span{width:8px;height:8px;border-radius:50%;display:inline-block}
.empty-meal{padding:11px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px;color:var(--text-muted);font-size:var(--font-sm)}
.empty-meal svg{width:22px;height:22px;opacity:0.5}

/* ---------- DETAIL PANEL ---------- */
.detail{border-top:1px solid var(--border);background:var(--bg-base);padding:16px;animation:slideIn 200ms}
.detail .dhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.detail .dname{font-weight:var(--fw-bold);font-size:var(--font-md)}
.serv-edit{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.serv-edit input{width:80px;text-align:center}
.macro-big{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.macro-big .mb{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:10px;text-align:center}
.macro-big .mb .n{font-size:var(--font-lg);font-weight:var(--fw-bold);font-variant-numeric:tabular-nums}
.macro-big .mb .u{font-size:var(--font-xs);color:var(--text-muted)}
.macro-big .mb .pct{font-size:var(--font-xs);color:var(--text-secondary);margin-top:3px}
.micro-cat{margin-bottom:4px}
.micro-cat-head{display:flex;align-items:center;gap:8px;padding:8px 0;cursor:pointer;font-size:var(--font-sm);font-weight:var(--fw-semibold);color:var(--text-secondary);user-select:none}
.micro-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;padding-bottom:8px}
.micro{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px}
.micro .mrow{display:flex;justify-content:space-between;font-size:var(--font-xs);margin-bottom:4px}
.micro .mn{color:var(--text-secondary)}
.micro .mv{font-weight:var(--fw-semibold);font-variant-numeric:tabular-nums}
.micro .mpct{color:var(--text-muted);margin-left:5px}
.micro .bar-track{height:3px}

/* ---------- WATER ---------- */
.water-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.glass{width:36px;height:36px;border-radius:50%;border:2px solid var(--border-strong);position:relative;overflow:hidden;transition:border-color var(--transition)}
.glass:hover{border-color:var(--water)}
.glass .fillw{position:absolute;inset:0;background:var(--water);transform:translateY(100%);transition:transform 350ms cubic-bezier(0.34,1.3,0.64,1);border-radius:50%}
.glass.full{border-color:var(--water)}
.glass.full .fillw{transform:translateY(0)}
.glass svg{position:absolute;inset:0;margin:auto;width:16px;height:16px;color:var(--text-muted);z-index:1}
.glass.full svg{color:rgba(8,8,14,0.7)}
.water-txt{margin-left:auto;text-align:right}
.water-txt .wt1{font-weight:var(--fw-bold);font-variant-numeric:tabular-nums}
.water-txt .wt2{font-size:var(--font-xs);color:var(--text-muted)}

/* ---------- QUICK STATS ---------- */
.qstats{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.qstats::-webkit-scrollbar{display:none}
.qchip{flex:0 0 auto;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-full);padding:7px 14px;font-size:var(--font-xs);font-weight:var(--fw-medium);display:flex;align-items:center;gap:6px;font-variant-numeric:tabular-nums}
.qchip .qd{width:7px;height:7px;border-radius:50%}
.qchip b{font-weight:var(--fw-bold)}

/* ---------- FAB ---------- */
#fab{position:fixed;right:24px;bottom:24px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-md),var(--glow-accent);z-index:45;transition:transform var(--transition);animation:fabPulse 2.5s ease-in-out infinite}
#fab:hover{transform:scale(1.08)}
#fab svg{width:26px;height:26px}
@keyframes fabPulse{0%,100%{box-shadow:var(--shadow-md),0 0 16px rgba(13,168,119,0.25)}50%{box-shadow:var(--shadow-md),0 0 30px rgba(13,168,119,0.5)}}

/* ---------- MODALS ---------- */
.overlay{position:fixed;inset:0;background:rgba(4,4,8,0.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 200ms}
.overlay.open{opacity:1}
.modal{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--radius-lg);width:min(640px,calc(100vw - 32px));max-height:calc(100vh - 64px);display:flex;flex-direction:column;box-shadow:var(--shadow-lg);transform:scale(0.96);opacity:0;transition:transform 200ms,opacity 200ms;overflow:hidden}
.overlay.open .modal{transform:scale(1);opacity:1}
.modal-head{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--border);flex:0 0 auto}
.modal-head h3{font-size:var(--font-md);font-weight:var(--fw-bold);flex:1}
.modal-body{padding:18px;overflow-y:auto;flex:1}
.modal-foot{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:10px;flex:0 0 auto}
.mtabs{display:flex;gap:4px;padding:10px 18px 0;border-bottom:1px solid var(--border)}
.mtab{padding:9px 16px;font-size:var(--font-sm);font-weight:var(--fw-semibold);color:var(--text-secondary);border-bottom:2px solid transparent;display:flex;align-items:center;gap:6px}
.mtab svg{width:15px;height:15px}
.mtab.active{color:var(--accent);border-bottom-color:var(--accent)}
.mtab:hover{color:var(--text-primary)}

/* ---------- SEARCH ---------- */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{width:100%;padding:12px 14px 12px 40px;font-size:var(--font-base);border-radius:var(--radius-md);background:var(--bg-base)}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text-muted)}
.res-group{margin-bottom:10px}
.res-group .rg-title{font-size:var(--font-xs);font-weight:var(--fw-bold);color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;padding:6px 2px}
.res{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-md);cursor:pointer;border:1px solid transparent}
.res:hover{background:var(--bg-hover);border-color:var(--border)}
.res .rinfo{flex:1;min-width:0}
.res .rname{font-weight:var(--fw-semibold);font-size:var(--font-sm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.res .rsub{font-size:var(--font-xs);color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.res .rcal{font-size:var(--font-sm);font-weight:var(--fw-bold);font-variant-numeric:tabular-nums;white-space:nowrap}
.badge{font-size:10px;font-weight:var(--fw-bold);padding:2px 7px;border-radius:var(--radius-full);text-transform:uppercase;letter-spacing:0.04em}
.badge.usda{background:rgba(91,200,250,0.15);color:var(--protein)}
.badge.custom{background:var(--accent-dim);color:var(--accent)}
.badge.recent{background:rgba(107,203,119,0.15);color:var(--fiber)}
.badge.off{background:rgba(255,209,102,0.15);color:var(--carbs)}
.badge.high{background:rgba(81,207,102,0.15);color:var(--success)}
.badge.medium{background:rgba(252,196,25,0.15);color:var(--warning)}
.badge.low{background:rgba(255,107,107,0.15);color:var(--danger)}
.skel{height:52px;border-radius:var(--radius-md);background:linear-gradient(90deg,var(--bg-surface) 25%,var(--bg-hover) 50%,var(--bg-surface) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;margin-bottom:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ---------- FORMS ---------- */
.frow{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.fcol{flex:1;min-width:130px;display:flex;flex-direction:column;gap:5px}
.fcol label{font-size:var(--font-xs);font-weight:var(--fw-semibold);color:var(--text-secondary)}
.fcol input,.fcol select{width:100%}
.seg{display:flex;background:var(--bg-base);border:1px solid var(--border);border-radius:var(--radius-md);padding:3px;gap:3px}
.seg button{flex:1;padding:7px 10px;border-radius:var(--radius-sm);font-size:var(--font-sm);font-weight:var(--fw-semibold);color:var(--text-secondary);transition:all var(--transition)}
.seg button.active{background:var(--accent);color:#fff}
.seg button:not(.active):hover{background:var(--bg-hover)}
.kv{display:flex;justify-content:space-between;padding:7px 0;font-size:var(--font-sm);border-bottom:1px solid var(--border)}
.kv:last-child{border-bottom:none}
.kv b{font-variant-numeric:tabular-nums}

/* ---------- INSIGHTS ---------- */
.period-sel{display:flex;gap:6px;margin-bottom:16px}
.score-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.score-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;display:flex;align-items:center;gap:14px}
.score-card .arc{flex:0 0 56px}
.score-card .sn{font-size:var(--font-xl);font-weight:var(--fw-bold);font-variant-numeric:tabular-nums;line-height:1}
.score-card .sl{font-size:var(--font-xs);color:var(--text-secondary);margin-top:4px;font-weight:var(--fw-medium)}
.streak-card{display:flex;align-items:center;gap:18px}
.streak-num{font-size:var(--font-3xl);font-weight:var(--fw-black);font-variant-numeric:tabular-nums;line-height:1}
.alert-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.alert-row:last-child{border-bottom:none}
.alert-row .an{font-weight:var(--fw-semibold);font-size:var(--font-sm)}
.alert-row .af{font-size:var(--font-xs);color:var(--text-secondary);margin-top:2px}
.badge.chronic{background:rgba(255,107,107,0.15);color:var(--danger)}
.chart-box{position:relative;height:260px}
.topfood{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);font-size:var(--font-sm)}
.topfood:last-child{border-bottom:none}
.topfood .rank{width:24px;height:24px;border-radius:50%;background:var(--bg-hover);display:flex;align-items:center;justify-content:center;font-size:var(--font-xs);font-weight:var(--fw-bold);color:var(--text-secondary);flex:0 0 24px}

/* ---------- LIBRARY ---------- */
.subtabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none}
.subtabs::-webkit-scrollbar{display:none}
.subtab{flex:0 0 auto;padding:8px 14px;border-radius:var(--radius-full);font-size:var(--font-sm);font-weight:var(--fw-semibold);color:var(--text-secondary);border:1px solid var(--border);background:var(--bg-surface)}
.subtab.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent)}
.lib-row{display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:1px solid var(--border)}
.lib-row:last-child{border-bottom:none}
.lib-row .linfo{flex:1;min-width:0;cursor:pointer}
.lib-row .lname{font-weight:var(--fw-semibold);font-size:var(--font-sm)}
.lib-row .lsub{font-size:var(--font-xs);color:var(--text-secondary);margin-top:1px}
.ing-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg-base);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;font-size:var(--font-sm)}
.ing-row input{width:70px;text-align:center;padding:4px 6px}

/* ---------- TABLES ---------- */
table.dt{width:100%;border-collapse:collapse;font-size:var(--font-sm)}
table.dt th{text-align:left;font-size:var(--font-xs);color:var(--text-muted);font-weight:var(--fw-semibold);text-transform:uppercase;letter-spacing:0.05em;padding:8px 6px;border-bottom:1px solid var(--border)}
table.dt td{padding:9px 6px;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums}
table.dt tr:last-child td{border-bottom:none}
.pos{color:var(--success)}.neg{color:var(--danger)}

/* ---------- SETTINGS ---------- */
.nt-table{width:100%;border-collapse:collapse;font-size:var(--font-sm)}
.nt-table td,.nt-table th{padding:6px;border-bottom:1px solid var(--border)}
.nt-table input{width:90px;padding:5px 8px;text-align:right}
.nt-cat{font-weight:var(--fw-bold);font-size:var(--font-xs);text-transform:uppercase;letter-spacing:0.06em;padding-top:16px !important}
.sched-row{display:flex;align-items:center;gap:10px;padding:7px 0}
.sched-row .dname{width:46px;font-weight:var(--fw-semibold);font-size:var(--font-sm)}
.dtype-card{background:var(--bg-base);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;margin-bottom:12px}
.dtype-card h4{font-size:var(--font-sm);font-weight:var(--fw-bold);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.consist{font-size:var(--font-xs);margin-top:8px;padding:7px 10px;border-radius:var(--radius-sm)}
.consist.ok{background:rgba(81,207,102,0.1);color:var(--success)}
.consist.bad{background:rgba(255,107,107,0.1);color:var(--danger)}
.mt-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg-base);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;cursor:grab}
.mt-row.dragging{opacity:0.4}
.mt-row .mtc{width:14px;height:14px;border-radius:50%;flex:0 0 14px}

/* ---------- CONTEXT MENU ---------- */
#ctxMenu{position:fixed;z-index:200;background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:var(--shadow-lg);padding:5px;min-width:185px}
#ctxMenu button{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:var(--radius-sm);font-size:var(--font-sm);text-align:left}
#ctxMenu button:hover{background:var(--bg-hover)}
#ctxMenu button.danger{color:var(--danger)}
#ctxMenu svg{width:15px;height:15px}

/* ---------- TOASTS ---------- */
#toasts{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--radius-md);padding:11px 18px;font-size:var(--font-sm);box-shadow:var(--shadow-md);animation:toastIn 250ms;max-width:min(420px,calc(100vw - 40px));display:flex;gap:8px;align-items:center}
.toast.error{border-color:var(--danger)}
.toast.success{border-color:var(--success)}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}}

/* ---------- CONFETTI ---------- */
.confetti-dot{position:fixed;width:9px;height:9px;border-radius:2px;z-index:400;pointer-events:none;animation:confFall 1.4s cubic-bezier(0.2,0.6,0.4,1) forwards}
@keyframes confFall{0%{transform:translate(0,0) rotate(0);opacity:1}100%{transform:translate(var(--cx),var(--cy)) rotate(540deg);opacity:0}}

/* ---------- ONBOARDING ---------- */
#onboard{position:fixed;inset:0;background:var(--bg-base);z-index:500;overflow-y:auto}
.ob-wrap{max-width:520px;margin:0 auto;padding:48px 24px 60px}
.ob-step-dots{display:flex;gap:6px;justify-content:center;margin-bottom:32px}
.ob-step-dots span{width:8px;height:8px;border-radius:50%;background:var(--border-strong);transition:all var(--transition)}
.ob-step-dots span.on{background:var(--accent);width:24px;border-radius:var(--radius-full)}
.ob-title{font-size:var(--font-2xl);font-weight:var(--fw-black);margin-bottom:8px;text-align:center}
.ob-sub{color:var(--text-secondary);text-align:center;margin-bottom:28px}
.goal-card{border:1px solid var(--border);border-radius:var(--radius-md);padding:16px;margin-bottom:10px;cursor:pointer;transition:all var(--transition)}
.goal-card:hover{border-color:var(--border-strong)}
.goal-card.sel{border-color:var(--accent);background:var(--accent-dim)}
.goal-card .gt{font-weight:var(--fw-bold)}
.goal-card .gd{font-size:var(--font-sm);color:var(--text-secondary);margin-top:3px}

/* ---------- BARCODE/PHOTO ---------- */
#bcReader{width:100%;border-radius:var(--radius-md);overflow:hidden;background:var(--bg-base);min-height:240px}
#bcReader video{border-radius:var(--radius-md)}
.photo-prev{width:100%;max-height:280px;object-fit:contain;border-radius:var(--radius-md);background:var(--bg-base)}
.ai-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg-base);border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:8px}
.ai-item input[type=text]{flex:1}
.ai-item input[type=number]{width:76px;text-align:center}

/* ---------- APPLE HIG LAYER ---------- */
.card,.meal{border:none;box-shadow:0 1px 2px rgba(0,0,0,0.25)}
.meal-head{border-left:none;padding-left:14px}
.seg{border:none;background:var(--bg-raised);padding:2px;border-radius:10px}
.seg button{border-radius:8px}
.seg button.active{background:#636366;color:#fff}
input,select,textarea{border-color:transparent;background:var(--bg-raised)}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
#topbar{background:rgba(0,0,0,0.82)}
#bottomnav{background:rgba(28,28,30,0.86)}
.page-head{margin:6px 2px 16px}
.page-head h1{font-size:34px;font-weight:800;letter-spacing:-0.022em;line-height:1.1}
.page-head .page-sub{font-size:15px;color:var(--text-secondary);margin-top:3px;font-weight:var(--fw-medium)}
.card,.meal{border-radius:18px}
.btn{border-radius:12px}
.bar-track{height:7px}
.calring .prog{stroke:var(--accent)}
.calring .prog.over{stroke:var(--danger)}
.mchip{width:34px;height:34px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;flex:0 0 34px}
.mchip svg{width:17px;height:17px}
.water-row .glass{width:18px;height:36px;border-radius:9px;border:none;background:var(--bg-hover);overflow:hidden}
.water-row .glass .fillw{border-radius:9px}
.water-row .glass svg{display:none}
.water-row .glass.full{border:none}
.streak-card.on{background:linear-gradient(135deg,var(--accent),#0B8F66);border:none;color:#fff}
.streak-card.on .streak-num{color:#fff}
.streak-card.on .muted{color:rgba(255,255,255,0.85)}
.remind-card{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--accent-dim);border:1px solid rgba(13,168,119,0.3);border-radius:18px;padding:14px 16px;margin-bottom:16px;animation:slideIn 250ms}
.remind-card .rc-icon{width:38px;height:38px;border-radius:12px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 38px}
.remind-card .rc-txt{flex:1;min-width:140px}
.remind-card .rc-title{font-weight:var(--fw-bold);font-size:var(--font-base)}
.remind-card .rc-sub{font-size:var(--font-xs);color:var(--text-secondary);margin-top:1px}
.remind-card input{width:90px;text-align:center}
.rg-title{letter-spacing:0.08em}
.sec-title{font-size:19px;letter-spacing:-0.01em}
/* iOS tab bar: tint only, no background blocks */
#bottomnav .nav-item,#bottomnav .nav-item.active,#bottomnav .nav-item:hover{background:transparent}
#bottomnav .nav-item.active{color:var(--accent)}
/* stable water layout: pills row, text always on its own row */
.water-row{flex-wrap:wrap}
.water-txt{flex-basis:100%;margin-left:0;margin-top:10px;text-align:left;display:flex;align-items:baseline;gap:10px}
.card.water-done{background:linear-gradient(135deg,rgba(78,205,196,0.16),rgba(13,168,119,0.08));box-shadow:0 0 0 1.5px var(--water) inset}
.water-done .wt1{color:var(--water)}
.wbadge{display:inline-flex;align-items:center;gap:5px;font-size:var(--font-xs);font-weight:var(--fw-bold);color:var(--water);margin-left:8px}
.wbadge svg{width:14px;height:14px}
/* macro ratio line in summary card */
.ratio-line{flex-basis:100%;font-size:var(--font-xs);color:var(--text-secondary);display:flex;gap:16px;flex-wrap:wrap;margin-top:4px}
.ratio-line b{font-variant-numeric:tabular-nums;color:var(--text-primary)}
/* settings containment */
.dtype-card .frow{gap:8px}
.dtype-card .fcol{min-width:calc(50% - 8px);flex:1 1 calc(50% - 8px)}
.dtype-card .fcol label{line-height:1.35}
html[data-theme="light"] .dtype-card input{background:#FFFFFF;border:1px solid var(--border)}
.mt-row{display:flex;flex-direction:column;gap:8px;cursor:grab;align-items:stretch}
.mtr1,.mtr2{display:flex;gap:8px;align-items:center}
.mtr1 [data-mtname]{flex:1;min-width:0}
.mtr1 input[type=color]{flex:0 0 36px;width:36px;height:34px;padding:2px;border-radius:8px}
.mtr2 input[type=time]{flex:1 1 0;width:auto;min-width:0;max-width:130px}
.mtr2 [data-mtshare]{flex:0 0 54px;width:54px;text-align:center}
/* meal picker chips in Add Food modal */
.mealpick{display:flex;gap:6px;padding:10px 18px 0;flex-wrap:wrap}
.mp{padding:6px 13px;border-radius:var(--radius-full);font-size:12px;font-weight:var(--fw-semibold);background:var(--bg-base);color:var(--text-secondary);border:1px solid var(--border);transition:all var(--transition)}
.mp.active{background:var(--c);border-color:var(--c);color:#fff}
html[data-theme="light"] .mp{background:#F2F2F7;border-color:transparent}
html[data-theme="light"] .mp.active{background:var(--c);color:#fff}

/* ---------- RESPONSIVE ---------- */
@media (max-width:767px){
  #sidenav{display:none}
  #bottomnav{display:flex}
  #topbar{padding:env(safe-area-inset-top) 10px 0;gap:4px}
  #dateLabel{font-size:var(--font-sm);padding:6px 6px}
  .icon-btn{width:32px;height:32px}
  .chip{padding:4px 8px;font-size:10px}
  .datenav{gap:0}
  #main{left:0;bottom:calc(var(--bottomnav-h) + env(safe-area-inset-bottom,0px))}
  .content{padding:16px 14px 132px}
  /* Prevent iOS auto-zoom on input focus: any focusable field must be >=16px */
  input,select,textarea{font-size:16px}
  .search-wrap input{font-size:16px}
  /* Settings refinement on phones */
  .card{padding:16px 14px}
  .frow{gap:10px}
  .frow .fcol{flex:1 1 calc(50% - 5px);min-width:calc(50% - 5px)}
  input[type=date],input[type=time],input[type=datetime-local]{min-width:0;width:100%;-webkit-appearance:none;appearance:none}
  .seg{max-width:none !important;width:100%}
  .nt-table input{width:74px}
  /* Balanced macro summary: calorie ring left, three equal bars stacked in one column */
  #macrobar{margin:-16px -14px 16px;padding:12px 14px;flex-wrap:nowrap;gap:16px}
  .mbars{flex:1;flex-basis:auto;min-width:0;flex-direction:column;gap:10px}
  .mbar{flex:none;width:100%;min-width:0}
  /* FAB sits bottom-right, clear of meal headers / "+ Add" buttons */
  #fab{right:16px;left:auto;transform:none;bottom:calc(var(--bottomnav-h) + 16px + env(safe-area-inset-bottom))}
  #fab:hover{transform:scale(1.08)}
  .overlay{align-items:flex-end}
  .modal{width:100%;max-height:92vh;border-radius:var(--radius-lg) var(--radius-lg) 0 0;transform:translateY(40px)}
  .overlay.open .modal{transform:translateY(0)}
  .score-grid{grid-template-columns:1fr 1fr}
  .macro-big{grid-template-columns:repeat(2,1fr)}
  .brand span{display:none}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important}
}
</style>

<body>
<header id="topbar">
  <div class="brand"><div class="logo">N</div><span>NutriCore</span></div>
  <div class="datenav">
    <button class="icon-btn" id="dnPrev" aria-label="Previous day"><i data-lucide="chevron-left"></i></button>
    <button id="dateLabel" aria-label="Open date picker"></button>
    <button class="icon-btn" id="dnNext" aria-label="Next day"><i data-lucide="chevron-right"></i></button>
  </div>
  <div class="topbar-right">
    <button id="dayTypeBadge" class="chip" aria-label="Cycle day type"></button>
    <button class="icon-btn" id="profileBtn" aria-label="Profile settings"><i data-lucide="user"></i></button>
  </div>
  <div id="calPop" class="cal-pop" hidden></div>
</header>
<nav id="sidenav" aria-label="Main navigation"></nav>
<main id="main"><div class="content" id="content"></div></main>
<nav id="bottomnav" aria-label="Main navigation"></nav>
<button id="fab" aria-label="Add food"><i data-lucide="plus"></i></button>
<div id="modalRoot"></div>
<div id="ctxMenu" hidden></div>
<div id="toasts" aria-live="polite"></div>
<div id="onboard" hidden></div>
<script>
/*JS-START*/
'use strict';
const APP_VERSION='2.4.2';
/* ============================================================
   THEME (dark / light) — applied before render to avoid a flash
============================================================ */
function getTheme(){try{return localStorage.getItem('nt_theme')==='dark'?'dark':'light'}catch(e){return 'light'}}
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  try{const m=document.querySelector('meta[name="theme-color"]');if(m)m.setAttribute('content',t==='light'?'#F2F2F7':'#000000');}catch(e){}
}
applyTheme(getTheme());
/* ============================================================
   CONSTANTS
============================================================ */
const NUTRIENTS=[
 {k:'calories',l:'Calories',u:'kcal',cat:'macros'},
 {k:'protein',l:'Protein',u:'g',cat:'macros'},
 {k:'carbohydrates',l:'Carbohydrates',u:'g',cat:'macros'},
 {k:'fat',l:'Fat',u:'g',cat:'macros'},
 {k:'saturatedFat',l:'Saturated Fat',u:'g',cat:'fats'},
 {k:'monounsaturatedFat',l:'Monounsaturated Fat',u:'g',cat:'fats'},
 {k:'polyunsaturatedFat',l:'Polyunsaturated Fat',u:'g',cat:'fats'},
 {k:'transFat',l:'Trans Fat',u:'g',cat:'fats'},
 {k:'omega3',l:'Omega-3 (ALA)',u:'g',cat:'fats'},
 {k:'omega6',l:'Omega-6',u:'g',cat:'fats'},
 {k:'fiber',l:'Fiber',u:'g',cat:'carbs'},
 {k:'sugar',l:'Sugar',u:'g',cat:'carbs'},
 {k:'addedSugar',l:'Added Sugar',u:'g',cat:'carbs'},
 {k:'netCarbs',l:'Net Carbs',u:'g',cat:'carbs'},
 {k:'vitaminA',l:'Vitamin A',u:'mcg',cat:'vitamins'},
 {k:'vitaminC',l:'Vitamin C',u:'mg',cat:'vitamins'},
 {k:'vitaminD',l:'Vitamin D',u:'mcg',cat:'vitamins'},
 {k:'vitaminE',l:'Vitamin E',u:'mg',cat:'vitamins'},
 {k:'vitaminK',l:'Vitamin K',u:'mcg',cat:'vitamins'},
 {k:'thiamin',l:'B1 (Thiamin)',u:'mg',cat:'vitamins'},

  function step(t){const p=Math.min(1,(t-t0)/dur);const v=from+(to-from)*(1-Math.pow(1-p,3));el.textContent=fmtN(Math.round(v));if(p<1)requestAnimationFrame(step)}

let db=null;
function initDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open('nutritionTracker',1);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      const fl=d.createObjectStore('foodLog',{keyPath:'id'});
      fl.createIndex('date','date',{unique:false});
      fl.createIndex('foodId','foodId',{unique:false});
      d.createObjectStore('customFoods',{keyPath:'id'});
      d.createObjectStore('meals',{keyPath:'id'});
      d.createObjectStore('weightLog',{keyPath:'date'});
      const wl=d.createObjectStore('workoutLog',{keyPath:'id'});
      wl.createIndex('date','date',{unique:false});
      d.createObjectStore('bodyMeasurements',{keyPath:'id'});
    };
    req.onsuccess=e=>{db=e.target.result;resolve()};
    req.onerror=e=>reject(e.target.error);
  });
}
function tx(store,mode,fn){
  return new Promise((resolve,reject)=>{
    try{
      const t=db.transaction(store,mode);const s=t.objectStore(store);
      const r=fn(s);
      t.oncomplete=()=>resolve(r&&r._result!==undefined?r._result:r);
      t.onerror=()=>reject(t.error);
      t.onabort=()=>reject(t.error||new Error('aborted'));
    }catch(err){reject(err)}
  });
}
function dbPut(store,obj){return tx(store,'readwrite',s=>{s.put(obj);return obj}).catch(handleDbErr)}
function dbBulkPut(store,arr){return tx(store,'readwrite',s=>{arr.forEach(o=>s.put(o))}).catch(handleDbErr)}
function dbDel(store,key){return tx(store,'readwrite',s=>{s.delete(key)}).catch(handleDbErr)}
function dbClear(store){return tx(store,'readwrite',s=>{s.clear()}).catch(handleDbErr)}
function dbGet(store,key){
  return new Promise((resolve,reject)=>{
    const r=db.transaction(store).objectStore(store).get(key);
    r.onsuccess=()=>resolve(r.result);r.onerror=()=>reject(r.error);
  });
}
function dbAll(store){
  return new Promise((resolve,reject)=>{
    const r=db.transaction(store).objectStore(store).getAll();
    r.onsuccess=()=>resolve(r.result||[]);r.onerror=()=>reject(r.error);
  });
}
function dbByIndex(store,index,val){
  return new Promise((resolve,reject)=>{
    const r=db.transaction(store).objectStore(store).index(index).getAll(val);
    r.onsuccess=()=>resolve(r.result||[]);r.onerror=()=>reject(r.error);
  });
}
function handleDbErr(err){
  if(err&&(err.name==='QuotaExceededError'||String(err).includes('Quota'))){
    toast('Local storage is nearly full. Export your data to free up space.','error');
  }else{
    toast('Database error: '+(err?.message||err),'error');
  }
  throw err;
}

function ageFrom(dob){if(!dob)return 30;const b=new Date(dob),n=new Date();let a=n.getFullYear()-b.getFullYear();const m=n.getMonth()-b.getMonth();if(m<0||(m===0&&n.getDate()<b.getDate()))a--;return Math.max(10,a)}
function calcBMR(p){
  const w=+p.weightKg||75,h=+p.heightCm||175,a=ageFrom(p.dob);
  return p.sex==='female'?(10*w)+(6.25*h)-(5*a)-161:(10*w)+(6.25*h)-(5*a)+5;
}
const ACTIVITY={sedentary:1.2,light:1.375,moderate:1.55,very:1.725,extreme:1.9};
function calcTDEE(p){return calcBMR(p)*(ACTIVITY[p.activity]||1.55)}
function calcTargetCals(p){
  const tdee=calcTDEE(p);const rate=+p.weeklyRate||0;
  const adj=rate*7700/7;
  if(p.goal==='cut')return tdee-adj;
  if(p.goal==='bulk')return tdee+adj;
  return tdee;
}
function defaultDayTargets(p){
  const base=Math.round(calcTargetCals(p));
  const prot=Math.round((+p.weightKg||75)*2);
  const mk=mult=>{
    const cals=Math.round(base*mult);
    const fat=Math.round(cals*0.25/9);
    const carbs=Math.max(0,Math.round((cals-prot*4-fat*9)/4));
    return {calories:cals,protein:prot,carbs:carbs,fat:fat};
  };
  /* Rest days eat below baseline; training/cardio days scale up — all editable in Settings. */
  return {rest:mk(0.93),training:mk(1.05),cardio:mk(1.0),both:mk(1.10)};
}
function dayTypeFor(date){
  if(settings.dayOverrides&&settings.dayOverrides[date])return settings.dayOverrides[date];
  const dow=new Date(date+'T12:00:00').getDay();
  return (settings.weekSchedule&&settings.weekSchedule[dow])||'rest';
}
function macroTargetsFor(date){
  const dt=dayTypeFor(date);
  if(targetsByType&&targetsByType[dt])return targetsByType[dt];
  if(targetsByType&&dt==='both'&&targetsByType.training)return targetsByType.training;
  if(profile)return defaultDayTargets(profile)[dt]||defaultDayTargets(profile).training;
  return {calories:2200,protein:150,carbs:230,fat:70};
}

 418:'vitaminB12',421:'choline',262:'caffeine',221:'alcohol',255:'water'
};
function mapUsdaNutrients(foodNutrients){
  const o=emptyN();let atw=0;
  for(const fn of foodNutrients||[]){
    const id=+(fn.nutrientId??fn.nutrient?.id??NaN);
    const num=+(fn.nutrientNumber??fn.nutrient?.number??NaN);
    const val=+(fn.value??fn.amount??0);
    if(isNaN(val))continue;
    if(id===2047||id===2048){atw=atw||val;continue}
    const key=USDA_NUTRIENT_MAP[id]||USDA_LEGACY_MAP[num];
    if(!key)continue;
    if(key==='folate'&&num===417&&o.folate>0)continue; /* prefer DFE (435) over total (417) */
    o[key]=val;
  }
  if(!o.calories&&atw)o.calories=atw;
  if(!o.calories)o.calories=o.protein*4+o.carbohydrates*4+o.fat*9+o.alcohol*7;
  o.netCarbs=Math.max(0,o.carbohydrates-o.fiber);
  return o;
}
async function usdaSearch(q){
  const key=(apiKeys.usda||'').trim();
  if(!key)throw new Error('NO_KEY');
  const url='https://api.nal.usda.gov/fdc/v1/foods/search?query='+encodeURIComponent(q)+'&api_key='+encodeURIComponent(key)+'&dataType=Foundation,SR%20Legacy,Branded&pageSize=25&sortBy=dataType.keyword&sortOrder=asc';
  const res=await fetch(url);
  if(!res.ok)throw new Error('USDA search failed ('+res.status+')');
  const data=await res.json();
  return (data.foods||[]).map(f=>({
    fdcId:f.fdcId,name:f.description||'Unknown',brand:f.brandOwner||f.brandName||'',
    dataType:f.dataType,nutrientsPer100g:mapUsdaNutrients(f.foodNutrients),source:'usda'
  }));
}
async function usdaDetails(fdcId){
  const key=(apiKeys.usda||'').trim();
  if(!key)throw new Error('NO_KEY');
  const res=await fetch('https://api.nal.usda.gov/fdc/v1/food/'+fdcId+'?api_key='+encodeURIComponent(key));
  if(!res.ok)throw new Error('USDA detail fetch failed ('+res.status+')');
  return await res.json();
}
function usdaServingsFromDetails(food){
  const list=[{grams:100,label:'100 g'},{grams:1,label:'1 g'},{grams:28.35,label:'1 oz'}];
  (food.foodPortions||[]).forEach(p=>{
    if(p.gramWeight){
      const desc=p.portionDescription||((p.amount?p.amount+' ':'')+(p.modifier||p.measureUnit?.name||'portion'));
      list.push({grams:p.gramWeight,label:desc.trim()+' ('+fmtAmt(p.gramWeight)+' g)'});
    }
  });
  if(food.servingSize&&/^g/i.test(food.servingSizeUnit||'')){
    const lbl=food.householdServingFullText?food.householdServingFullText+' ('+food.servingSize+' g)':'1 serving ('+food.servingSize+' g)';
    list.push({grams:+food.servingSize,label:lbl});
  }
  return list;
}
async function pendingFromUsda(item){
  let nutrients=item.nutrientsPer100g,servings=[{grams:100,label:'100 g'},{grams:1,label:'1 g'},{grams:28.35,label:'1 oz'}];
  try{
    const det=await usdaDetails(item.fdcId);
    const mapped=mapUsdaNutrients(det.foodNutrients);
    if(mapped.calories||mapped.protein||mapped.fat||mapped.carbohydrates)nutrients=mapped;
    servings=usdaServingsFromDetails(det);
  }catch(e){/* fall back to search-level nutrients */}
  return {name:item.name,brand:item.brand||'',source:'usda',fdcId:String(item.fdcId),nutrientsPer100g:nutrients,servings};
}
function pendingFromCustom(cf){
  const servings=[{grams:100,label:'100 g'},{grams:1,label:'1 g'},{grams:28.35,label:'1 oz'}];
  (cf.servingSizes||[]).forEach(s=>{
    if(s.amount&&!(s.amount===100&&s.unit==='g'))servings.push({grams:+s.amount,label:(s.label||(s.amount+' '+(s.unit||'g')))+' ('+fmtAmt(s.amount)+' g)'});
  });
  return {name:cf.name,brand:cf.brand||'',source:cf.source||'custom',fdcId:cf.fdcId||null,customId:cf.id,nutrientsPer100g:Object.assign(emptyN(),cf.nutrientsPer100g||{}),servings};
}
function pendingFromEntry(e){
  const per100=e.per100g||(e.gramsTotal?scaleN(e.nutrients,100/e.gramsTotal):scaleN(e.nutrients,1/(e.servingAmount||1)));
  const gpu=e.gramsTotal&&e.servingAmount?e.gramsTotal/e.servingAmount:100;
  return {name:e.foodName,brand:'',source:'recent',fdcId:e.foodId,nutrientsPer100g:per100,
    servings:[{grams:gpu,label:(e.servingLabel||'serving').replace(/^[\d.]+\s*×\s*/,'')},{grams:100,label:'100 g'},{grams:1,label:'1 g'},{grams:28.35,label:'1 oz'}]};
}
async function offLookup(barcode){
  const res=await fetch('https://world.openfoodfacts.org/api/v0/product/'+encodeURIComponent(barcode)+'.json');
  if(!res.ok)throw new Error('Open Food Facts request failed');
  const data=await res.json();
  if(data.status!==1)return null;
  const p=data.product,n=p.nutriments||{};
  const per100=Object.assign(emptyN(),{
    calories:+n['energy-kcal_100g']||0, protein:+n['proteins_100g']||0, fat:+n['fat_100g']||0,
    saturatedFat:+n['saturated-fat_100g']||0, carbohydrates:+n['carbohydrates_100g']||0,
    sugar:+n['sugars_100g']||0, fiber:+n['fiber_100g']||0, sodium:(+n['sodium_100g']||0)*1000,
    transFat:+n['trans-fat_100g']||0, cholesterol:(+n['cholesterol_100g']||0)*1000,
    potassium:(+n['potassium_100g']||0)*1000, calcium:(+n['calcium_100g']||0)*1000,
    iron:(+n['iron_100g']||0)*1000, caffeine:(+n['caffeine_100g']||0)*1000,
    alcohol:+n['alcohol_100g']||0
  });
  per100.netCarbs=Math.max(0,per100.carbohydrates-per100.fiber);
  const servings=[{grams:100,label:'100 g'},{grams:1,label:'1 g'},{grams:28.35,label:'1 oz'}];
  /* OFF serving_size is free text like "1 tray (340 g)" — take serving_quantity
     (numeric grams) when present, else extract the gram figure, never the leading count. */
  let sg=parseFloat(p.serving_quantity);
  if(isNaN(sg)||sg<=0){
    const m=/([\d.]+)\s*(g|ml)\b/i.exec(p.serving_size||'');
    if(m)sg=parseFloat(m[1]);
  }
  if(sg>1)servings.unshift({grams:sg,label:'1 serving ('+(p.serving_size||fmtAmt(sg)+' g')+')'});
  return {name:p.product_name||('Product '+barcode),brand:p.brands||'',source:'off',fdcId:null,nutrientsPer100g:per100,servings};
}
async function identifyFoodFromPhoto(base64Image,mimeType){
  const key=(apiKeys.anthropic||'').trim();
  if(!key)throw new Error('NO_AI_KEY');
  const response=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json','x-api-key':key,
      'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-6',max_tokens:1000,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mimeType,data:base64Image}},
        {type:'text',text:'Analyze this food image. Return ONLY valid JSON (no markdown, no explanation) with this exact structure:\n{"items": [{"name": "string (specific food name for USDA database search)", "estimatedGrams": number, "confidence": "high"|"medium"|"low", "notes": "optional string"}]}'}
      ]}]
    })
  });
  if(!response.ok){
    const err=await response.json().catch(()=>({}));
    throw new Error('Anthropic API error: '+(err.error?.message||response.status));
  }
  const data=await response.json();
  let text=(data.content?.[0]?.text||'').trim();
  text=text.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```$/,'').trim();
  return JSON.parse(text);
}

function wireToday(entries){
  const byId=Object.fromEntries(entries.map(e=>[e.id,e]));
  $$('.meal-head').forEach(h=>{
    h.addEventListener('click',e=>{
      if(e.target.closest('[data-addmeal]'))return;
      const meal=h.closest('.meal');const id=meal.dataset.meal;
      const body=meal.querySelector('.meal-body');const chev=h.querySelector('.chev');
      const open=body.hidden;
      body.hidden=!open;chev.classList.toggle('open',open);
      h.setAttribute('aria-expanded',open);
      S.expandedMeals[id]=open;
    });
    h.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();h.click()}});
  });
  $$('[data-addmeal]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();openAddModal(b.dataset.addmeal)}));
  $$('.entry').forEach(row=>{
    const entry=byId[row.dataset.eid];if(!entry)return;
    row.addEventListener('click',()=>toggleDetail(row,entry));
    row.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();toggleDetail(row,entry)}});
    row.addEventListener('contextmenu',e=>{e.preventDefault();showCtx(e.clientX,e.clientY,entry)});
    let lpTimer=null;
    row.addEventListener('touchstart',e=>{
      lpTimer=setTimeout(()=>{const t=e.touches[0];showCtx(t.clientX,t.clientY,entry)},550);
    },{passive:true});
    ['touchend','touchmove','touchcancel'].forEach(ev=>row.addEventListener(ev,()=>clearTimeout(lpTimer),{passive:true}));
  });
  // water
  const wrow=$('#waterRow');
  if(wrow){
    wrow.querySelectorAll('.glass').forEach(g=>{
      let lp=null,longPressed=false;
      g.addEventListener('click',()=>{
        if(longPressed){longPressed=false;return}
        const i=+g.dataset.gi;const cur=waterFor(S.date);
        const next=cur===i+1?i:i+1;
        const goal=+settings.waterGoal||8;
        setWater(S.date,next);
        if(next>=goal&&cur<goal){confetti();toast('Hydration goal hit — '+goal+'/'+goal+' glasses','success')}
        renderToday();
      });
      const startLP=()=>{lp=setTimeout(()=>{longPressed=true;promptWaterGoal()},600)};
      const endLP=()=>clearTimeout(lp);
      g.addEventListener('touchstart',startLP,{passive:true});
      g.addEventListener('mousedown',startLP);
      ['touchend','touchmove','mouseup','mouseleave'].forEach(ev=>g.addEventListener(ev,endLP,{passive:true}));
    });
  }
}
function promptWaterGoal(){

function detailHtml(entry){
  const n=entry.nutrients||{};
  const mt=macroTargetsFor(S.date);
  const big=(label,val,unit,target,color)=>{
    const pct=target>0?Math.round(val/target*100):null;
    return `<div class="mb"><div class="n" style="color:${color}">${fmtAmt(val)}</div><div class="u">${label} (${unit})</div>${pct!=null?`<div class="pct">${pct}% of target</div>`:''}</div>`;
  };
  let cats='';
  for(const cat of ['fats','carbs','vitamins','minerals','other']){
    const list=NUTRIENTS.filter(x=>x.cat===cat);
    const items=list.map(x=>{
      const v=+n[x.k]||0;const fl=ntFloor(x.k);
      const pct=fl>0?Math.min(100,v/fl*100):0;
      return `<div class="micro"><div class="mrow"><span class="mn">${x.l}</span><span><span class="mv">${fmtAmt(v)} ${x.u}</span>${fl>0?`<span class="mpct">${Math.round(v/fl*100)}%</span>`:''}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${CAT_COLORS[cat]}"></div></div></div>`;
    }).join('');
    cats+=`<div class="micro-cat"><div class="micro-cat-head" data-mc="${cat}" role="button" tabindex="0"><i data-lucide="chevron-down" style="width:14px;height:14px"></i> ${CAT_LABELS[cat]}</div><div class="micro-grid">${items}</div></div>`;
  }
  return `<div class="detail" data-detail="${entry.id}">
    <div class="dhead"><span class="dname">${esc(entry.foodName)}</span>
      <span style="display:flex;gap:4px">
        <button class="icon-btn" data-deldetail aria-label="Delete entry"><i data-lucide="trash-2" style="color:var(--danger)"></i></button>
        <button class="icon-btn" data-closedetail aria-label="Close details"><i data-lucide="x"></i></button>
      </span></div>
    <div class="serv-edit">
      <label class="muted" style="font-size:var(--font-xs)">Serving</label>
      <input type="number" step="0.25" min="0.05" value="${entry.servingAmount}" data-servqty aria-label="Serving quantity">
      <span class="muted" style="font-size:var(--font-xs)">× ${esc((entry.servingLabel||'serving').replace(/^[\d.]+\s*×\s*/,''))} — ${fmtAmt(entry.gramsTotal||0)} g total</span>
      <button class="btn sm" data-servsave>Update</button>
    </div>
    <div class="macro-big">
      ${big('Calories',n.calories,'kcal',(+mt.calories||0),'var(--cal)')}
      ${big('Protein',n.protein,'g',(+mt.protein||0),'var(--protein)')}
      ${big('Carbs',n.carbohydrates,'g',(+mt.carbs||0),'var(--carbs)')}
      ${big('Fat',n.fat,'g',(+mt.fat||0),'var(--fat)')}
    </div>
    ${cats}
  </div>`;
}
function toggleDetail(row,entry){
  const existing=row.nextElementSibling;
  if(existing&&existing.classList.contains('detail')){existing.remove();return}
  $$('.detail').forEach(d=>d.remove());
  row.insertAdjacentHTML('afterend',detailHtml(entry));
  const panel=row.nextElementSibling;
  icons();
  panel.querySelector('[data-closedetail]').addEventListener('click',e=>{e.stopPropagation();panel.remove()});
  panel.querySelector('[data-deldetail]').addEventListener('click',async e=>{
    e.stopPropagation();
    row.classList.add('removing');panel.remove();
    await new Promise(r=>setTimeout(r,240));
    await deleteEntry(entry.id);
    toast('Deleted '+entry.foodName,'success');
    renderToday();
  });
  panel.querySelectorAll('.micro-cat-head').forEach(h=>{
    h.addEventListener('click',()=>{const g=h.nextElementSibling;g.hidden=!g.hidden});
    h.addEventListener('keydown',e=>{if(e.key==='Enter')h.click()});
  });
  panel.querySelector('[data-servsave]').addEventListener('click',async e=>{
    e.stopPropagation();
    const qty=Math.max(0.05,+panel.querySelector('[data-servqty]').value||1);
    await rescaleEntry(entry,qty);
    renderToday();
  });
  panel.addEventListener('click',e=>e.stopPropagation());
}
async function rescaleEntry(entry,qty){
  const oldQty=entry.servingAmount||1;
  const gpu=entry.gramsTotal&&oldQty?entry.gramsTotal/oldQty:null;
  if(entry.per100g&&gpu!=null){
    entry.gramsTotal=gpu*qty;
    entry.nutrients=scaleN(entry.per100g,entry.gramsTotal/100);
  }else{
    entry.nutrients=scaleN(entry.nutrients,qty/oldQty);
    if(entry.gramsTotal)entry.gramsTotal=entry.gramsTotal*qty/oldQty;
  }
  entry.servingAmount=qty;
  const baseLabel=(entry.servingLabel||'serving').replace(/^[\d.]+\s*×\s*/,'');
  entry.servingLabel=(qty!==1?fmtAmt(qty)+' × ':'')+baseLabel;
  await dbPut('foodLog',entry);
}

  m.querySelectorAll('button').forEach(b=>b.addEventListener('click',async()=>{
    hideCtx();

async function favoriteEntry(entry){
  const all=await dbAll('customFoods');

    cf={id:uid(),name:entry.foodName,brand:'',source:'usda',fdcId:entry.foodId||null,
      servingSizes:[{amount:100,unit:'g',label:'100g'}],

function guessMealType(){
  const h=new Date().getHours();
  for(const m of settings.mealTypes){
    const [sh]=String(m.start||'0').split(':').map(Number);

    if(h>=sh&&h<=eh&&m.id!=='snacks')return m.id;
  }
  return settings.mealTypes[settings.mealTypes.length-1]?.id||'snacks';
}

async function localMatches(q){
  const ql=q.toLowerCase();
  const customs=(await dbAll('customFoods')).filter(c=>(c.name+' '+(c.brand||'')).toLowerCase().includes(ql)).slice(0,8);
  const logs=await dbAll('foodLog');
  const seen=new Set();const recents=[];
  logs.sort((a,b)=>b.timestamp-a.timestamp);
  for(const e of logs){
    if(seen.has(e.foodName.toLowerCase()))continue;
    if(e.foodName.toLowerCase().includes(ql)){recents.push(e);seen.add(e.foodName.toLowerCase())}
    if(recents.length>=6)break;
  }
  return {customs,recents};
}
function resRow(name,sub,cal,badge,badgeCls){
  return `<div class="res"><div class="rinfo"><div class="rname">${esc(name)}</div><div class="rsub">${esc(sub)}</div></div>
    <span class="badge ${badgeCls}">${badge}</span><span class="rcal">${fmtN(cal)} cal</span></div>`;
}
async function runLocalSearch(ov,q){
  const wrap=ov.querySelector('#searchResults');if(!wrap)return;
  const {customs,recents}=await localMatches(q);
  let html='';
  if(customs.length){
    html+='<div class="res-group"><div class="rg-title">Your Foods</div>'+customs.map((c,i)=>
      `<div data-custom="${i}">${resRow(c.name,(c.brand||'Custom food')+' · per 100g',c.nutrientsPer100g?.calories||0,c.source==='custom'?'Custom':c.source==='off'?'OFF':'Saved',c.source==='custom'?'custom':c.source==='off'?'off':'usda')}</div>`).join('')+'</div>';
  }
  if(recents.length){
    html+='<div class="res-group"><div class="rg-title">Recent</div>'+recents.map((r,i)=>
      `<div data-recent="${i}">${resRow(r.foodName,r.servingLabel||'recent entry',r.nutrients?.calories||0,'Recent','recent')}</div>`).join('')+'</div>';
  }
  html+='<div class="res-group" id="usdaGroup"><div class="rg-title">USDA</div><div class="skel"></div><div class="skel"></div><div class="skel"></div></div>';
  wrap.innerHTML=html;
  wrap.querySelectorAll('[data-custom]').forEach(el=>el.addEventListener('click',()=>showServingSelector(ov,pendingFromCustom(customs[+el.dataset.custom]))));
  wrap.querySelectorAll('[data-recent]').forEach(el=>el.addEventListener('click',()=>showServingSelector(ov,pendingFromEntry(recents[+el.dataset.recent]))));
}
async function runSearch(ov,q){
  if(q.length<2)return;
  const group=ov.querySelector('#usdaGroup');if(!group)return;
  if(!(apiKeys.usda||'').trim()){
    group.innerHTML='<div class="rg-title">USDA</div><div class="muted" style="padding:6px 2px">Add your USDA API key in Settings for instant food search.</div>';
    return;
  }
  try{

async function identifyFoodFromText(text){
  const key=(apiKeys.anthropic||'').trim();
  if(!key)throw new Error('NO_AI_KEY');
  const response=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1000,messages:[{role:'user',content:
      'You are a nutrition logging assistant. The user describes what they ate; break it into individual foods with realistic gram estimates from typical portions (1 egg = 50 g, 1 bacon strip = 12 g cooked, 1 slice bread = 30 g, 1 cup cooked rice = 160 g). Multiply by quantities mentioned. Return ONLY valid JSON, no markdown:\n{"items":[{"name":"simple food name suited to USDA search","estimatedGrams":number,"confidence":"high"|"medium"|"low"}]}\n\nUser ate: '+text}]})
  });
  if(!response.ok){
    const err=await response.json().catch(()=>({}));
    throw new Error('Anthropic API error: '+(err.error?.message||response.status));
  }
  const data=await response.json();
  let t=(data.content?.[0]?.text||'').trim();
  t=t.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```$/,'').trim();
  return JSON.parse(t);
}

    if(ann&&!Chart.registry.plugins.get('annotation'))Chart.register(ann);

function computeNutritionScores(dailyTotals,targets){
  const categories={
    vitamins:['vitaminA','vitaminC','vitaminD','vitaminE','vitaminK','thiamin','riboflavin','niacin','vitaminB6','folate','vitaminB12'],
    minerals:['calcium','iron','magnesium','phosphorus','zinc','copper','manganese','selenium'],
    electrolytes:['sodium','potassium','magnesium','calcium'],
    macros:['protein','fiber'],
    antioxidants:['vitaminC','vitaminE','selenium','zinc'],
    hydration:['water']
  };
  const scores={};
  for(const [category,nutrients] of Object.entries(categories)){
    const pcts=nutrients.map(n=>{
      const floor=targets[n]?.floor;
      if(!floor)return null;
      const avg=dailyTotals.reduce((sum,d)=>sum+(d[n]||0),0)/Math.max(1,dailyTotals.length);
      return Math.min(100,(avg/floor)*100);
    }).filter(v=>v!==null);
    scores[category]=pcts.length>0?Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length):0;
  }
  return scores;
}
async function periodData(period){
  const days=Array.from({length:period},(_,i)=>addDaysStr(todayStr(),-(period-1-i)));
  const all=await dbAll('foodLog');
  const byDate={};
  all.forEach(e=>{(byDate[e.date]=byDate[e.date]||[]).push(e)});
  const totals=days.map(d=>{
    const t=sumDay(byDate[d]||[]);
    t._date=d;t._logged=!!(byDate[d]&&byDate[d].length);
    t.water=(t.water||0)+waterFor(d)*250;
    return t;
  });
  return {days,byDate,totals,all};
}
async function renderInsights(){
  chartDefaults();
  const period=S.period;
  const {days,byDate,totals}=await periodData(period);
  const loggedTotals=totals.filter(t=>t._logged);
  const streak=await streakCalc();S.lastStreak=streak;
  const weights=await dbAll('weightLog');
  const wByDate=Object.fromEntries(weights.map(w=>[w.date,+w.kg]));
  const scores=computeNutritionScores(loggedTotals.length?loggedTotals:[emptyN()],nutrientTargets);

  // deficiency
  const defs=[];
  if(loggedTotals.length){
    const last7=totals.slice(-7).filter(t=>t._logged);
    for(const nt of NUTRIENTS){
      const fl=ntFloor(nt.k);
      if(!fl||['calories','sugar','addedSugar','sodium','saturatedFat','transFat','cholesterol','caffeine','alcohol','netCarbs','monounsaturatedFat','polyunsaturatedFat','carbohydrates','fat'].includes(nt.k))continue;
      const avg=loggedTotals.reduce((s,t)=>s+(t[nt.k]||0),0)/loggedTotals.length;
      const pct=avg/fl*100;
      if(pct<70){
        const lowDays=last7.filter(t=>(t[nt.k]||0)<fl*0.7).length;
        defs.push({k:nt.k,l:nt.l,pct:Math.round(pct),chronic:lowDays>5});
      }
    }
    defs.sort((a,b)=>a.pct-b.pct);
  }

  // top foods
  const counts={};
  for(const d of days)for(const e of (byDate[d]||[])){
    const key=e.foodName;
    counts[key]=counts[key]||{n:0,cal:0,g:0};
    counts[key].n++;counts[key].cal+=(+e.nutrients?.calories||0);counts[key].g+=(+e.gramsTotal||0);
  }
  const top=Object.entries(counts).sort((a,b)=>b[1].n-a[1].n).slice(0,8);

  const scoreCard=(label,val,color)=>{

      <svg class="arc" width="56" height="56" viewBox="0 0 56 56" role="img" aria-label="${label}: ${val}%">
        <circle cx="28" cy="28" r="22" fill="none" stroke="var(--bg-hover)" stroke-width="6"/>
        <circle cx="28" cy="28" r="22" fill="none" stroke="${c}" stroke-width="6" stroke-linecap="round"
          stroke-dasharray="${circ2}" stroke-dashoffset="${circ2*(1-Math.min(100,val)/100)}" transform="rotate(-90 28 28)"/>
      </svg>
      <div><div class="sn" style="color:${c}">${val}%</div><div class="sl" style="color:${color}">${label}</div></div></div>`;
  };

  $('#content').innerHTML=`
  ${pageHead('Insights','Last '+period+' days')}
  <div class="period-sel seg" style="max-width:300px">
    ${[[7,'Week'],[30,'Month'],[90,'90 Days']].map(([p,l])=>`<button data-p="${p}" class="${p===period?'active':''}" aria-label="${l} period">${l}</button>`).join('')}
  </div>
  <div class="card streak-card${streak>0?' on':''}">
    <i data-lucide="${streak>=7?'trophy':'flame'}" style="width:38px;height:38px;color:${streak>0?'#fff':'var(--text-muted)'}"></i>
    <div><div class="streak-num"${streak>0?'':' style="color:var(--text-muted)"'}>${streak} day${streak===1?'':'s'}</div>
    <div class="muted">logging streak${streak>=7?' — keep it going':''}</div></div>
  </div>
  <div class="card"><div class="sec-title"><i data-lucide="bar-chart-3"></i> Calorie Balance</div>
    <div class="chart-box"><canvas id="calChart" aria-label="Calorie balance chart" role="img"></canvas></div></div>
  <div class="card"><div class="sec-title"><i data-lucide="layers"></i> Macro Trend</div>
    <div class="seg" style="max-width:300px;margin-bottom:12px" id="macroModeSeg">
      ${['grams','calories','percent'].map(m=>`<button data-m="${m}" class="${S.insMode===m?'active':''}">${m==='percent'?'% of total':m[0].toUpperCase()+m.slice(1)}</button>`).join('')}
    </div>
    <div class="chart-box"><canvas id="macroChart" aria-label="Macro trend chart" role="img"></canvas></div></div>
  <div class="card"><div class="sec-title"><i data-lucide="gauge"></i> Nutrition Scores <span class="tiny" style="font-weight:400">(avg % of floors hit, logged days)</span></div>
    <div class="score-grid">
      ${scoreCard('Macros',scores.macros,'var(--accent)')}
      ${scoreCard('Vitamins',scores.vitamins,'var(--vitamins)')}
      ${scoreCard('Minerals',scores.minerals,'var(--minerals)')}
      ${scoreCard('Electrolytes',scores.electrolytes,'var(--electrolytes)')}
      ${scoreCard('Antioxidants',scores.antioxidants,'var(--antioxidants)')}
      ${scoreCard('Hydration',scores.hydration,'var(--water)')}
    </div></div>
  <div class="card"><div class="sec-title"><i data-lucide="alert-triangle"></i> Deficiency Alerts</div>
    ${defs.length?defs.map(d=>{
      const foods=(SUGGEST_FOODS[d.k]||['Varied whole foods']).slice(0,3).join(', ');
      return `<div class="alert-row"><i data-lucide="alert-circle" style="width:17px;height:17px;color:${d.chronic?'var(--danger)':'var(--warning)'};flex:0 0 17px;margin-top:2px"></i>

      plugins:{legend:{display:hasWeight},

      scales:{x:{stacked:true,grid:{display:false}},y:{stacked:true,beginAtZero:true,max:mode==='percent'?100:undefined,title:{display:true,text:unit}}}}

function renderLibSearch(body){
  body.innerHTML=`
    <div class="search-wrap"><i data-lucide="search"></i><input id="libSearch" placeholder="Search USDA FoodData Central…" aria-label="Search USDA"></div>
    <div id="libResults"><div class="muted">${(apiKeys.usda||'').trim()?'Type to search the USDA database.':'Add your USDA API key in Settings for instant food search.'}</div></div>`;
  icons();
  const input=body.querySelector('#libSearch');
  const run=debounce(async()=>{
    const q=input.value.trim();if(q.length<2)return;
    const out=body.querySelector('#libResults');
    out.innerHTML='<div class="skel"></div><div class="skel"></div><div class="skel"></div>';
    try{
      const results=await usdaSearch(q);
      if(!results.length){out.innerHTML='<div class="muted">No results.</div>';return}
      out.innerHTML=results.map((r,i)=>`<div data-i="${i}">${resRow(r.name,(r.brand?r.brand+' · ':'')+r.dataType+' · per 100g',r.nutrientsPer100g.calories,'USDA','usda')}</div>`).join('');
      out.querySelectorAll('[data-i]').forEach(el=>el.addEventListener('click',async()=>{
        el.innerHTML='<div class="skel" style="margin:0"></div>';
        const pf=await pendingFromUsda(results[+el.dataset.i]);
        libQuickAddModal(pf);renderLibrary();
      }));
    }catch(err){
      out.innerHTML='<div class="muted" style="color:var(--warning)">'+(String(err.message).includes('NO_KEY')?'Add your USDA API key in Settings for instant food search.':'Search unavailable. Check your API key in Settings or your connection.')+'</div>';
    }
  },400);
  input.addEventListener('input',run);
  setTimeout(()=>input.focus(),100);
}
async function renderLibRecents(body){
  const logs=await dbAll('foodLog');
  logs.sort((a,b)=>b.timestamp-a.timestamp);
  const seen=new Set();const recents=[];
  for(const e of logs){
    const key=e.foodName.toLowerCase();
    if(seen.has(key))continue;seen.add(key);recents.push(e);
    if(recents.length>=50)break;
  }
  if(!recents.length){body.innerHTML='<div class="card"><p class="muted">No foods logged yet. Add something from the Today view.</p></div>';return}
  body.innerHTML='<div class="card">'+recents.map((r,i)=>`
    <div class="lib-row"><div class="linfo" data-i="${i}"><div class="lname">${esc(r.foodName)}</div>
      <div class="lsub">${esc(r.servingLabel||'')} · ${fmtN(r.nutrients?.calories)} cal · last logged ${new Date(r.timestamp).toLocaleDateString()}</div></div>
      <button class="btn sm primary" data-q="${i}" aria-label="Quick add ${esc(r.foodName)}"><i data-lucide="plus"></i> Log</button></div>`).join('')+'</div>';
  body.querySelectorAll('[data-q]').forEach(b=>b.addEventListener('click',async()=>{
    const r=recents[+b.dataset.q];
    const pf=pendingFromEntry(r);
    try{
      await addLogEntry(pf,pf.servings[0],r.servingAmount||1,r.mealType||guessMealType(),S.date,Date.now());
      toast('Logged '+r.foodName,'success');
    }catch(e){toast('Could not log: '+(e.message||e),'error')}
  }));
  body.querySelectorAll('.linfo').forEach(el=>el.addEventListener('click',()=>{
    libQuickAddModal(pendingFromEntry(recents[+el.dataset.i]));
  }));
}

function customFoodForm(cf){
  const isEdit=!!cf;
  cf=cf||{id:uid(),name:'',brand:'',source:'custom',fdcId:null,servingSizes:[{amount:100,unit:'g',label:'100g'}],nutrientsPer100g:emptyN(),createdAt:Date.now(),isFavorite:false};
  const nutrInputs=cat=>NUTRIENTS.filter(n=>n.cat===cat).map(n=>`
    <div class="fcol" style="min-width:150px"><label>${n.l} (${n.u})</label>
    <input type="number" step="any" min="0" data-nk="${n.k}" value="${cf.nutrientsPer100g?.[n.k]||''}" placeholder="—" aria-label="${n.l}"></div>`).join('');
  const ov=openModal(`
    <div class="modal-head"><h3>${isEdit?'Edit':'Create'} Custom Food</h3><button class="icon-btn" data-close aria-label="Close"><i data-lucide="x"></i></button></div>
    <div class="modal-body">
      <div class="frow">
        <div class="fcol"><label>Name *</label><input id="cfName" value="${esc(cf.name)}" placeholder="e.g. Homemade granola"></div>
        <div class="fcol"><label>Brand (optional)</label><input id="cfBrand" value="${esc(cf.brand||'')}"></div>
      </div>
      <div class="rg-title">Serving sizes (gram weight + label)</div>
      <div id="cfServings">${cf.servingSizes.map((s,i)=>servRowHtml(s,i)).join('')}</div>
      <button class="btn sm" id="cfAddServ" style="margin:6px 0 14px"><i data-lucide="plus"></i> Add serving size</button>
      <div class="rg-title">Nutrition per 100 g — blank = unknown</div>
      ${['macros','fats','carbs','vitamins','minerals','other'].map(cat=>`
        <div class="micro-cat"><div class="micro-cat-head" data-cfc role="button" tabindex="0"><i data-lucide="chevron-down" style="width:14px;height:14px"></i> ${CAT_LABELS[cat]}</div>
        <div class="frow" ${cat==='macros'?'':'hidden'}>${nutrInputs(cat)}</div></div>`).join('')}
    </div>
    <div class="modal-foot"><button class="btn" data-close style="flex:1">Cancel</button><button class="btn primary" id="cfSave" style="flex:2">Save Food</button></div>`,{wide:true});
  function servRowHtml(s,i){
    return `<div class="ing-row" data-srow>
      <input type="number" step="any" min="0.1" value="${s.amount}" data-samt aria-label="Gram weight"> <span class="tiny">g =</span>
      <input type="text" value="${esc(s.label)}" data-slbl placeholder="label e.g. 1 cup" style="flex:1;width:auto;text-align:left">
      <button class="icon-btn" data-sdel aria-label="Remove serving"><i data-lucide="x"></i></button></div>`;
  }
  const wireServDel=()=>ov.querySelectorAll('[data-sdel]').forEach(b=>b.onclick=()=>{if(ov.querySelectorAll('[data-srow]').length>1)b.closest('[data-srow]').remove()});
  wireServDel();
  ov.querySelector('#cfAddServ').addEventListener('click',()=>{
    ov.querySelector('#cfServings').insertAdjacentHTML('beforeend',servRowHtml({amount:'',label:''},0));
    icons();wireServDel();
  });
  ov.querySelectorAll('[data-cfc]').forEach(h=>h.addEventListener('click',()=>{const g=h.nextElementSibling;g.hidden=!g.hidden}));
  ov.querySelector('#cfSave').addEventListener('click',async()=>{
    const name=ov.querySelector('#cfName').value.trim();
    if(!name){toast('Name is required','error');return}
    cf.name=name;cf.brand=ov.querySelector('#cfBrand').value.trim();
    cf.servingSizes=[...ov.querySelectorAll('[data-srow]')].map(r=>({
      amount:+r.querySelector('[data-samt]').value||100,unit:'g',
      label:r.querySelector('[data-slbl]').value.trim()||(r.querySelector('[data-samt]').value+'g')
    })).filter(s=>s.amount>0);
    if(!cf.servingSizes.some(s=>s.amount===100))cf.servingSizes.unshift({amount:100,unit:'g',label:'100g'});
    const n=emptyN();
    ov.querySelectorAll('[data-nk]').forEach(inp=>{const v=parseFloat(inp.value);if(!isNaN(v))n[inp.dataset.nk]=v});
    n.netCarbs=Math.max(0,n.carbohydrates-n.fiber);
    if(!n.calories&&!n.protein&&!n.fat&&!n.carbohydrates){
      const ok=await confirmDialog('No calories or macros entered — logging this food will add 0 kcal to your day. Save anyway?',{confirmText:'Save Anyway'});
      if(!ok)return;
    }
    cf.nutrientsPer100g=n;
    await dbPut('customFoods',cf);
    closeModal();toast('Saved '+cf.name,'success');
    if(S.view==='library')renderLibrary();
  });
}
